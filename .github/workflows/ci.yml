name: CI

on:
    push:
      branches: [master, main]
    pull_request:
      branches: [master, main]

jobs:
    test:
      strategy:
        matrix:
          os: [macos-latest, ubuntu-latest]
      runs-on: ${{ matrix.os }}
      steps:
        - uses: actions/checkout@v4
        - uses: dtolnay/rust-toolchain@stable
        - uses: Swatinem/rust-cache@v2
        - name: Build
          run: cargo build --release
        - name: Unit tests
          run: cargo test --bin rail
        - name: Integration tests
          run: cargo test --test integration -- --test-threads=2
          timeout-minutes: 10
        - name: Clippy
          run: cargo clippy -- -W warnings 2>&1 || true
        - name: Format check
          run: cargo fmt --check 2>&1 || true

    release:
      needs: test
      if: startsWith(github.ref, 'refs/tags/v')
      strategy:
        matrix:
          include:
            - os: macos-latest
              target: aarch64-apple-darwin
              artifact: rail-macos-arm64
            - os: macos-13
              target: x86_64-apple-darwin
              artifact: rail-macos-x86_64
            - os: ubuntu-latest
              target: x86_64-unknown-linux-gnu
              artifact: rail-linux-x86_64
      runs-on: ${{ matrix.os }}
      steps:
        - uses: actions/checkout@v4
        - uses: dtolnay/rust-toolchain@stable
          with:
            targets: ${{ matrix.target }}
        - name: Build release
          run: cargo build --release --target ${{ matrix.target }}
        - name: Package
          run: |
            cp target/${{ matrix.target }}/release/rail ${{ matrix.artifact }}
            chmod +x ${{ matrix.artifact }}
        - name: Upload artifact
          uses: actions/upload-artifact@v4
          with:
            name: ${{ matrix.artifact }}
            path: ${{ matrix.artifact }}

name: CI

on:
    push:
      branches: [master, main]
    pull_request:
      branches: [master, main]

jobs:
    test:
      runs-on: macos-latest
      steps:
        - uses: actions/checkout@v4
        - name: Run test suite
          run: ./rail_native test
        - name: Self-compile (fixed point)
          run: |
            ./rail_native self
            cp /tmp/rail_self ./rail_gen1
            ./rail_gen1 self
            diff <(xxd /tmp/rail_self) <(xxd ./rail_gen1) && echo "Fixed point: gen1 == gen2"

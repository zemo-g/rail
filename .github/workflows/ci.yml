name: CI

on:
    push:
      branches: [master, main]
    pull_request:
      branches: [master, main]

jobs:
    test:
      runs-on: macos-latest
      steps:
        - uses: actions/checkout@v4
        - name: Run test suite
          run: ./rail_native test
        - name: Self-compile
          run: |
            ./rail_native self
            diff <(xxd /tmp/rail_self) <(xxd ./rail_native) && echo "Fixed point: OK"

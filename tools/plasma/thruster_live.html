<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RAIL PLASMA — Live GPU</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06060a;color:#c0c0c0;font-family:ui-monospace,'SF Mono',Menlo,monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#top{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:#0a0a12;border-bottom:1px solid #1a1a24;flex-wrap:wrap;gap:4px}
#title{font-size:12px;color:#e0e0e8;letter-spacing:2px}
#title span{color:#556;font-size:10px}
#status{font-size:10px;padding:2px 8px;border-radius:3px}
.live{background:#1a2a1a;color:#4f4;border:1px solid #2a4a2a}
.off{background:#2a1a1a;color:#f44;border:1px solid #4a2a2a}
#metrics{display:flex;gap:12px;font-size:12px;color:#667;flex-wrap:wrap}
.mt{color:#f84}.mi{color:#8f6}.mv{color:#6cf}.me{color:#fa6}.mp{color:#a8f}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#canvas-wrap{flex:1;position:relative}
canvas{display:block;width:100%;height:100%;touch-action:none}
#controls{padding:8px 12px;background:#0a0a12;border-top:1px solid #1a1a24;overflow-y:auto;max-height:40vh;font-size:11px}
.row{display:flex;align-items:center;gap:4px;margin:3px 0}
.row label{flex:0 0 60px;color:#667;text-align:right;padding-right:4px;font-size:11px}
.row input[type=range]{flex:1;height:5px;-webkit-appearance:none;background:#151520;border:1px solid #2a2a36;border-radius:2px}
.row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:#c9a84c;border-radius:50%}
.row .val{width:60px;text-align:right;color:#aab;font-size:10px}
.row select{background:#151520;color:#aab;border:1px solid #2a2a36;font-family:inherit;font-size:11px;padding:2px 4px}
.btn{background:#1a1a28;border:1px solid #2a2a3a;color:#aab;padding:5px 12px;font-family:inherit;font-size:11px;cursor:pointer;border-radius:3px}
.btn:hover{background:#252538}.btn.on{background:#2a1a1a;border-color:#c9a84c;color:#c9a84c}
.preset-row{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.field-row{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0}
.field-btn{padding:3px 8px;font-size:10px;cursor:pointer;background:#151520;border:1px solid #2a2a36;color:#889;border-radius:2px}
.field-btn.on{background:#1a1a2a;border-color:#c9a84c;color:#c9a84c}
#overlay{position:absolute;bottom:4px;right:8px;font-size:9px;color:#334;pointer-events:none}

@media(max-width:420px){
  #metrics{font-size:11px;gap:6px 10px}
  .row label{flex:0 0 50px;font-size:10px}
}
</style>
</head>
<body>
<div id="top">
  <div id="title">RAIL PLASMA <span>live GPU · 256×512</span></div>
  <span id="status" class="off">OFFLINE</span>
  <div id="metrics">
    <span>T: <span class="mt" id="m-T">—</span> mN</span>
    <span>ISP: <span class="mi" id="m-isp">—</span> s</span>
    <span>v<sub>e</sub>: <span class="mv" id="m-ve">—</span> km/s</span>
    <span>P: <span class="mp" id="m-P">—</span> W</span>
    <span>&eta;: <span class="me" id="m-eff">—</span>%</span>
  </div>
</div>
<div id="main">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="overlay">M4 Pro Metal · 131K cells · Lax-Friedrichs MHD</div>
  </div>
  <div id="controls">
    <div class="row"><label>Current</label><input type="range" id="s-I" min="10" max="10000" value="200"><span class="val" id="v-I">200 A</span></div>
    <div class="row"><label>Mass flow</label><input type="range" id="s-mdot" min="1" max="100" value="10"><span class="val" id="v-mdot">10 mg/s</span></div>
    <div class="row"><label>B applied</label><input type="range" id="s-B" min="0" max="500" value="100"><span class="val" id="v-B">0.100 T</span></div>
    <div class="row"><label>Gas</label><select id="s-gas"><option value="39.948" selected>Argon</option><option value="131.293">Xenon</option><option value="1.008">Hydrogen</option><option value="4.003">Helium</option><option value="6.941">Lithium</option></select></div>
    <div class="row"><label>Cathode r</label><input type="range" id="s-rc" min="2" max="20" value="5"><span class="val" id="v-rc">5 mm</span></div>
    <div class="row"><label>Anode r</label><input type="range" id="s-ra" min="10" max="80" value="25"><span class="val" id="v-ra">25 mm</span></div>
    <div class="preset-row">
      <button class="btn on" onclick="preset('sx3')">SX3</button>
      <button class="btn" onclick="preset('jpl')">JPL</button>
      <button class="btn" onclick="preset('pinch')">Self-Field</button>
    </div>
    <div class="field-row">
      <span class="field-btn on" data-f="1" onclick="setField(this)">Temp</span>
      <span class="field-btn" data-f="0" onclick="setField(this)">Density</span>
      <span class="field-btn" data-f="2" onclick="setField(this)">Velocity</span>
      <span class="field-btn" data-f="3" onclick="setField(this)">|B|</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let DSR = 64, DSZ = 128, NFIELDS = 6;
let fieldData = null;
let viewField = 1; // 0=rho, 1=T, 2=|v|, 3=|B|, 4=vz, 5=vr
let lastFrameId = -1;
let gpuActive = false;
let pollInterval = null;

function resize() {
  let wrap = document.getElementById('canvas-wrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

// ── Colormap (inferno) ──
function inferno(t) {
  t = Math.max(0, Math.min(1, t));
  let r, g, b;
  if (t < 0.33) {
    let s = t / 0.33;
    r = s * 120; g = 0; b = s * 160;
  } else if (t < 0.66) {
    let s = (t - 0.33) / 0.33;
    r = 120 + s * 135; g = s * 80; b = 160 - s * 120;
  } else {
    let s = (t - 0.66) / 0.34;
    r = 255; g = 80 + s * 175; b = 40 + s * 40;
  }
  return [r | 0, g | 0, b | 0];
}

// ── Render frame from GPU data ──
function renderFrame() {
  if (!fieldData) return;
  ctx.clearRect(0, 0, W, H);

  let field = fieldData.fields[viewField];
  if (!field) return;

  // Find min/max
  let vmin = Infinity, vmax = -Infinity;
  for (let i = 0; i < field.length; i++) {
    if (field[i] < vmin) vmin = field[i];
    if (field[i] > vmax) vmax = field[i];
  }
  let range = vmax - vmin || 1;

  let marginX = 10, marginY = 10;
  let simW = W - marginX * 2;
  let simH = H - marginY * 2;
  let halfH = simH / 2;
  let centerY = marginY + halfH;

  // Render as mirrored cross-section
  let img = ctx.createImageData(simW | 0, simH | 0);
  let data = img.data;

  for (let py = 0; py < (simH | 0); py++) {
    for (let px = 0; px < (simW | 0); px++) {
      let zf = px / simW;
      let rf = Math.abs(py - halfH) / halfH; // 0=center, 1=edge

      if (rf > 0.98) {
        let idx = (py * (simW | 0) + px) * 4;
        data[idx] = 4; data[idx+1] = 4; data[idx+2] = 8; data[idx+3] = 255;
        continue;
      }

      // Map to downsampled grid
      let di = Math.min(DSZ - 1, (zf * DSZ) | 0);
      let dj = Math.min(DSR - 1, (rf * DSR) | 0);
      let dk = dj * DSZ + di;

      let v = field[dk];
      let t = (v - vmin) / range;
      let [r, g, b] = inferno(t);

      let idx = (py * (simW | 0) + px) * 4;
      data[idx] = r; data[idx+1] = g; data[idx+2] = b; data[idx+3] = 255;
    }
  }
  ctx.putImageData(img, marginX, marginY);

  // Tube outline
  ctx.strokeStyle = 'rgba(100, 140, 180, 0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(marginX, marginY, simW, simH);

  // Center line (cathode axis)
  ctx.strokeStyle = 'rgba(140, 120, 90, 0.3)';
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(marginX, centerY);
  ctx.lineTo(marginX + simW, centerY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Labels
  ctx.fillStyle = '#445';
  ctx.font = '9px monospace';
  let fieldNames = ['density', 'temperature', 'velocity', '|B| field', 'v_z', 'v_r'];
  ctx.fillText(fieldNames[viewField] || '', marginX + 4, marginY + simH - 4);

  // Colorbar
  let cbX = marginX + simW - 12, cbH = simH - 20;
  for (let py = 0; py < cbH; py++) {
    let t = 1 - py / cbH;
    let [r, g, b] = inferno(t);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(cbX, marginY + 10 + py, 8, 1);
  }
}

// ── Poll GPU frames ──
async function pollFrame() {
  try {
    let resp = await fetch('/frame');
    if (!resp.ok) { setOffline(); return; }
    let buf = await resp.arrayBuffer();
    if (buf.byteLength < 32) { setOffline(); return; }

    let header = new Uint32Array(buf, 0, 4);
    DSR = header[0]; DSZ = header[1]; NFIELDS = header[2];
    let frameId = header[3];

    if (frameId === lastFrameId) return; // no new frame
    lastFrameId = frameId;

    let metrics = new Float32Array(buf, 16, 8);
    document.getElementById('m-T').textContent = metrics[0].toFixed(1);
    document.getElementById('m-isp').textContent = metrics[1].toFixed(0);
    document.getElementById('m-ve').textContent = metrics[2].toFixed(1);
    document.getElementById('m-P').textContent = metrics[3].toFixed(0);
    document.getElementById('m-eff').textContent = metrics[4].toFixed(1);

    // Parse field data
    let dataOffset = 16 + 8 * 4; // header + metrics
    let cellCount = DSR * DSZ;
    let fields = [];
    for (let f = 0; f < NFIELDS; f++) {
      fields.push(new Float32Array(buf, dataOffset + f * cellCount * 4, cellCount));
    }
    fieldData = { fields, frameId };
    setOnline();
    renderFrame();
  } catch (e) {
    setOffline();
  }
}

function setOnline() {
  if (gpuActive) return;
  gpuActive = true;
  let s = document.getElementById('status');
  s.textContent = 'LIVE'; s.className = 'live';
}
function setOffline() {
  gpuActive = false;
  let s = document.getElementById('status');
  s.textContent = 'OFFLINE'; s.className = 'off';
}

// Start polling
pollInterval = setInterval(pollFrame, 33); // ~30fps

// ── Send control updates ──
let controlTimeout = null;
function sendControl() {
  let ctrl = {
    rc: +document.getElementById('s-rc').value * 0.001,
    ra: +document.getElementById('s-ra').value * 0.001,
    L: 0.08,
    I: +document.getElementById('s-I').value,
    mdot: +document.getElementById('s-mdot').value * 1e-6,
    B: +document.getElementById('s-B').value * 0.001,
    gas_mass: +document.getElementById('s-gas').value,
    nozzle: 0.5,
    coils: [{ z: 0.3, s: 1.0 }, { z: 0.6, s: 0.7 }]
  };
  fetch('/control', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(ctrl)
  }).catch(() => {});
}

function debouncedControl() {
  clearTimeout(controlTimeout);
  controlTimeout = setTimeout(sendControl, 200);
}

// Slider listeners
for (let id of ['s-I', 's-mdot', 's-B', 's-rc', 's-ra']) {
  document.getElementById(id).addEventListener('input', function() {
    // Update labels
    document.getElementById('v-I').textContent = document.getElementById('s-I').value + ' A';
    document.getElementById('v-mdot').textContent = document.getElementById('s-mdot').value + ' mg/s';
    document.getElementById('v-B').textContent = (+document.getElementById('s-B').value * 0.001).toFixed(3) + ' T';
    document.getElementById('v-rc').textContent = document.getElementById('s-rc').value + ' mm';
    document.getElementById('v-ra').textContent = document.getElementById('s-ra').value + ' mm';
    debouncedControl();
  });
}
document.getElementById('s-gas').addEventListener('change', debouncedControl);

// Field selector
function setField(el) {
  document.querySelectorAll('.field-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  viewField = +el.dataset.f;
  renderFrame();
}

// Presets
function preset(name) {
  let presets = {
    sx3:   { I: 200,  mdot: 10, B: 100, rc: 5,  ra: 25, gas: '39.948' },
    jpl:   { I: 5000, mdot: 20, B: 200, rc: 10, ra: 60, gas: '6.941' },
    pinch: { I: 1000, mdot: 8,  B: 0,   rc: 5,  ra: 20, gas: '39.948' }
  };
  let p = presets[name]; if (!p) return;
  document.getElementById('s-I').value = p.I;
  document.getElementById('s-mdot').value = p.mdot;
  document.getElementById('s-B').value = p.B;
  document.getElementById('s-rc').value = p.rc;
  document.getElementById('s-ra').value = p.ra;
  document.getElementById('s-gas').value = p.gas;
  // Update labels
  document.getElementById('v-I').textContent = p.I + ' A';
  document.getElementById('v-mdot').textContent = p.mdot + ' mg/s';
  document.getElementById('v-B').textContent = (p.B * 0.001).toFixed(3) + ' T';
  document.getElementById('v-rc').textContent = p.rc + ' mm';
  document.getElementById('v-ra').textContent = p.ra + ' mm';
  document.querySelectorAll('.preset-row .btn').forEach(b => b.classList.remove('on'));
  event.target.classList.add('on');
  sendControl();
}

// Render loop (for when no new frames — keep display alive)
function loop() {
  if (fieldData) renderFrame();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>

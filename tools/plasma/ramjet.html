<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RAIL PLASMA RAMJET — Magnetic Compression Thruster</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06060a;color:#c0c0c0;font-family:ui-monospace,'SF Mono',Menlo,monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column}
canvas{display:block;cursor:crosshair}
#top{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:#0a0a12;border-bottom:1px solid #1a1a24}
#title{font-size:14px;color:#e0e0e8;letter-spacing:2px}
#title span{color:#556;font-size:10px;letter-spacing:1px}
#metrics{font-size:11px;display:flex;gap:18px;color:#667}
.mv{color:#6cf}.mt{color:#f84}.mi{color:#8f6}.me{color:#fa6}
#mid{flex:1;position:relative}
#bottom{padding:6px 16px;background:#0a0a12;border-top:1px solid #1a1a24;display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:11px}
#bottom label{color:#667}
#bottom input[type=range]{width:80px;height:4px;-webkit-appearance:none;background:#151520;border:1px solid #2a2a36;border-radius:2px}
#bottom input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#c9a84c;border-radius:50%;cursor:pointer}
.btn{background:#1a1a28;border:1px solid #2a2a3a;color:#aab;padding:3px 10px;font-family:inherit;font-size:11px;cursor:pointer;border-radius:3px}
.btn:hover{background:#252538}.btn.active{background:#2a1a1a;border-color:#c9a84c;color:#c9a84c}
#overlay{position:absolute;bottom:8px;right:12px;font-size:10px;color:#445;text-align:right;pointer-events:none}
#dash{position:absolute;top:8px;right:12px;font-size:11px;color:#889;text-align:right;line-height:1.6;pointer-events:none}
.dlab{color:#556;font-size:10px;text-transform:uppercase;letter-spacing:1px}
.dval{font-size:16px;font-weight:bold}
@media(max-width:800px){
  body{overflow:auto;height:auto}
  #top{flex-direction:column;gap:4px;padding:6px 10px}
  #metrics{flex-wrap:wrap;gap:6px 12px;font-size:11px}
  #mid{min-height:300px}
  #bottom{flex-wrap:wrap;gap:6px;padding:6px 10px}
  #bottom input[type=range]{width:70px;height:6px}
  #bottom input[type=range]::-webkit-slider-thumb{width:18px;height:18px}
  #bottom label{font-size:11px}
  .btn{padding:6px 10px;font-size:11px}
  #dash{font-size:10px;top:4px;right:6px}
  .dval{font-size:13px}
  #overlay{font-size:8px}
  canvas{touch-action:none}
}
</style>
</head>
<body>
<div id="top">
  <div id="title">RAIL PLASMA RAMJET <span>magnetic compression thruster simulator</span></div>
  <div id="metrics">
    <span>Thrust: <span class="mt" id="m-thrust">0</span> mN</span>
    <span>ISP: <span class="mi" id="m-isp">0</span> s</span>
    <span>v<sub>exit</sub>: <span class="mv" id="m-vex">0</span> km/s</span>
    <span>Comp: <span class="me" id="m-comp">1.0</span>x</span>
    <span>&#7745;: <span class="mv" id="m-mdot">0</span> mg/s</span>
  </div>
</div>
<div id="mid">
  <canvas id="c"></canvas>
  <div id="dash">
    <div class="dlab">Exhaust velocity</div>
    <div class="dval mt" id="d-vex">0</div>
    <div class="dlab" style="margin-top:8px">Specific impulse</div>
    <div class="dval mi" id="d-isp">0</div>
    <div class="dlab" style="margin-top:8px">Compression ratio</div>
    <div class="dval me" id="d-comp">1.0</div>
    <div class="dlab" style="margin-top:8px">Efficiency</div>
    <div class="dval" style="color:#8af" id="d-eff">0%</div>
  </div>
  <div id="overlay">click tube to place coil &middot; drag to move<br>RIGHT-CLICK flip polarity &middot; DEL remove last<br>SPACE pause &middot; R reset</div>
</div>
<div id="bottom">
  <button class="btn active" id="btn-play">&#9654; Run</button>
  <button class="btn" id="btn-reset">Reset</button>
  <label>Coil Power: <input type="range" id="coil-power" min="1" max="100" value="40"><span id="v-power">40</span></label>
  <label>Arc Voltage: <input type="range" id="arc-voltage" min="0" max="50" value="20"><span id="v-voltage">20</span>kV</label>
  <label>Inlet Pressure: <input type="range" id="inlet-p" min="1" max="100" value="30"><span id="v-inlet">30</span>Pa</label>
  <label>Nozzle: <input type="range" id="nozzle-ratio" min="10" max="90" value="50"><span id="v-nozzle">50</span>%</label>
  <label>Gas: <input type="range" id="gas-mass" min="1" max="40" value="4"><span id="v-gas">He</span></label>
  <button class="btn" id="btn-preset1">MPD Thruster</button>
  <button class="btn" id="btn-preset2">Hall Effect</button>
  <button class="btn" id="btn-preset3">Ramjet Pinch</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Simulation grid ──
const NX = 150;  // cells along tube axis
let rho = new Float64Array(NX);    // density
let vel = new Float64Array(NX);    // axial velocity
let prs = new Float64Array(NX);    // pressure
let bth = new Float64Array(NX);    // azimuthal B field (from coils)
let rho_n = new Float64Array(NX);
let vel_n = new Float64Array(NX);
let prs_n = new Float64Array(NX);

// ── Coils (user-placed) ──
let coils = [];   // {x: 0-1 along tube, strength: float, polarity: 1/-1}
let dragCoil = -1;

// ── Geometry ──
let W, H, tubeX, tubeY, tubeW, tubeH;
let running = true;
let paused = false;

// ── Physics constants ──
const GAMMA = 5/3;
const MU0 = 1.0;
const KB = 1.38e-23;
const G0 = 9.81;

function gasName(m) {
  if (m <= 1) return 'H';
  if (m <= 4) return 'He';
  if (m <= 14) return 'N';
  if (m <= 20) return 'Ne';
  if (m <= 40) return 'Ar';
  return '?';
}

function resize() {
  W = Math.max(320, window.innerWidth);
  H = Math.max(200, window.innerHeight - 80);
  canvas.width = W;
  canvas.height = H;
  canvas.style.touchAction = 'none';
  tubeW = W * 0.72;
  tubeH = H * 0.28;
  tubeX = W * 0.06;
  tubeY = (H - tubeH) / 2;
}
resize();
window.addEventListener('resize', resize);

// ── Nozzle shape ──
// Returns tube radius at position t (0-1 along tube)
function nozzleRadius(t) {
  let throatPos = +document.getElementById('nozzle-ratio').value / 100;
  let throatR = 0.35;  // min radius as fraction of full
  // Smooth converging-diverging
  let dist = Math.abs(t - throatPos);
  let sigma = 0.15;
  let pinch = Math.exp(-dist * dist / (2 * sigma * sigma));
  return 1.0 - (1.0 - throatR) * pinch;
}

// ── Magnetic field from coils ──
function computeBField() {
  let power = +document.getElementById('coil-power').value / 10;
  for (let i = 0; i < NX; i++) {
    let t = i / NX;
    let b = 0;
    for (let c of coils) {
      let dist = t - c.x;
      let sigma = 0.04;
      b += c.strength * c.polarity * power * Math.exp(-dist * dist / (2 * sigma * sigma));
    }
    bth[i] = b;
  }
}

// ── Initialize ──
function initSim() {
  let p0 = +document.getElementById('inlet-p').value;
  let rho0 = 1.0 + p0 / 30;
  let v0 = 2.0;
  let prs0 = 1.0 + p0 / 20;
  for (let i = 0; i < NX; i++) {
    let t = i / NX;
    rho[i] = rho0;
    vel[i] = v0 * (0.8 + 0.4 * t);  // accelerating flow
    prs[i] = prs0 * (1.0 - 0.2 * t); // decreasing pressure (expansion)
  }
  computeBField();
}

// Start with Ramjet Pinch preset so something is visible immediately
coils = [
  {x: 0.2, strength: 3, polarity: 1},
  {x: 0.35, strength: 5, polarity: 1},
  {x: 0.45, strength: 7, polarity: 1},
  {x: 0.6, strength: 5, polarity: -1},
  {x: 0.75, strength: 3, polarity: -1}
];
initSim();

// ── Compute CFL-limited timestep ──
function computeDt() {
  let dx = 1.0 / NX;
  let smax = 0.01;
  for (let i = 0; i < NX; i++) {
    let cs = Math.sqrt(GAMMA * Math.max(0.001, prs[i]) / Math.max(0.01, rho[i]));
    let ca = Math.abs(bth[i]) / Math.sqrt(Math.max(0.01, rho[i]));
    let s = Math.abs(vel[i]) + cs + ca;
    if (s > smax) smax = s;
  }
  return 0.3 * dx / smax;  // CFL = 0.3
}

// ── 1D MHD step (Lax-Friedrichs with magnetic pressure + Lorentz force) ──
function simStep() {
  let dt = computeDt();
  let voltage = +document.getElementById('arc-voltage').value / 10;
  let throatPos = +document.getElementById('nozzle-ratio').value / 100;
  let dx = 1.0 / NX;

  computeBField();

  for (let i = 1; i < NX - 1; i++) {
    let t = i / NX;
    let area = nozzleRadius(t);
    let area_l = nozzleRadius((i - 1) / NX);
    let area_r = nozzleRadius((i + 1) / NX);

    // Lax-Friedrichs averaging
    let rho_avg = 0.5 * (rho[i-1] + rho[i+1]);
    let vel_avg = 0.5 * (vel[i-1] + vel[i+1]);
    let prs_avg = 0.5 * (prs[i-1] + prs[i+1]);

    // Fluxes
    let flux_rho_r = rho[i+1] * vel[i+1] * area_r;
    let flux_rho_l = rho[i-1] * vel[i-1] * area_l;

    let ptot_r = prs[i+1] + 0.5 * bth[i+1] * bth[i+1] / MU0;
    let ptot_l = prs[i-1] + 0.5 * bth[i-1] * bth[i-1] / MU0;
    let flux_mom_r = (rho[i+1] * vel[i+1] * vel[i+1] + ptot_r) * area_r;
    let flux_mom_l = (rho[i-1] * vel[i-1] * vel[i-1] + ptot_l) * area_l;

    let e_r = prs[i+1] / (GAMMA - 1) + 0.5 * rho[i+1] * vel[i+1] * vel[i+1] + 0.5 * bth[i+1] * bth[i+1] / MU0;
    let e_l = prs[i-1] / (GAMMA - 1) + 0.5 * rho[i-1] * vel[i-1] * vel[i-1] + 0.5 * bth[i-1] * bth[i-1] / MU0;
    let flux_e_r = (e_r + ptot_r) * vel[i+1] * area_r;
    let flux_e_l = (e_l + ptot_l) * vel[i-1] * area_l;

    let cx = dt / (2 * dx);

    // Update with area correction
    rho_n[i] = rho_avg - cx * (flux_rho_r - flux_rho_l) / area;
    let mom_new = rho_avg * vel_avg - cx * (flux_mom_r - flux_mom_l) / area;

    // Nozzle area gradient force (pressure acts on changing area)
    let dAdx = (area_r - area_l) / (2 * dx);
    let p_local = prs_avg + 0.5 * bth[i] * bth[i] / MU0;
    mom_new += dt * p_local * dAdx / area;

    // Lorentz force (J × B acceleration) — current from voltage
    let dBdx = (bth[i+1] - bth[i-1]) / (2 * dx);
    let jtheta = -dBdx / MU0;  // curl B
    let lorentz = jtheta * bth[i] * voltage * 0.5;
    mom_new += dt * lorentz;

    // Energy injection in discharge zone (between coils where |B| gradient is steep)
    let heating = 0;
    if (voltage > 0) {
      let b_mag = Math.abs(bth[i]);
      let grad_b = Math.abs(dBdx);
      heating = voltage * grad_b * b_mag * 0.01;
    }

    let e_avg = prs_avg / (GAMMA - 1) + 0.5 * rho_avg * vel_avg * vel_avg + 0.5 * bth[i] * bth[i] / MU0;
    let e_new = e_avg - cx * (flux_e_r - flux_e_l) / area + dt * heating;

    // Recover velocity and pressure
    if (rho_n[i] < 0.01) rho_n[i] = 0.01;
    vel_n[i] = mom_new / rho_n[i];
    let ke = 0.5 * rho_n[i] * vel_n[i] * vel_n[i];
    let me = 0.5 * bth[i] * bth[i] / MU0;
    prs_n[i] = (GAMMA - 1) * (e_new - ke - me);
    if (prs_n[i] < 0.001) prs_n[i] = 0.001;
  }

  // Boundary conditions
  let p0 = +document.getElementById('inlet-p').value;
  // Left: inlet (fixed conditions — plasma source)
  rho_n[0] = 1.0 + p0 / 30;
  vel_n[0] = 2.0 + voltage * 0.5;
  prs_n[0] = 1.0 + p0 / 20;
  // Right: open outflow (extrapolate)
  rho_n[NX-1] = rho_n[NX-2];
  vel_n[NX-1] = vel_n[NX-2];
  prs_n[NX-1] = prs_n[NX-2];

  // Swap
  let tmp;
  tmp = rho; rho = rho_n; rho_n = tmp;
  tmp = vel; vel = vel_n; vel_n = tmp;
  tmp = prs; prs = prs_n; prs_n = tmp;
}

// ── Rendering ──
function tubeYTop(t) { return tubeY + tubeH * 0.5 * (1 - nozzleRadius(t)); }
function tubeYBot(t) { return tubeY + tubeH * 0.5 * (1 + nozzleRadius(t)); }

function render() {
  ctx.clearRect(0, 0, W, H);

  // Background field lines (faint)
  ctx.globalAlpha = 0.08;
  for (let i = 0; i < NX; i += 4) {
    let x = tubeX + (i / NX) * tubeW;
    let b = bth[i];
    if (Math.abs(b) < 0.1) continue;
    let len = Math.min(Math.abs(b) * 3, tubeH * 0.6);
    let cy = tubeY + tubeH / 2;
    ctx.strokeStyle = b > 0 ? '#4488ff' : '#ff4488';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, cy - len / 2);
    ctx.lineTo(x, cy + len / 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Tube outline (nozzle shape)
  ctx.strokeStyle = 'rgba(100, 130, 160, 0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(tubeX, tubeYTop(0));
  for (let i = 0; i <= NX; i++) {
    let t = i / NX;
    ctx.lineTo(tubeX + t * tubeW, tubeYTop(t));
  }
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(tubeX, tubeYBot(0));
  for (let i = 0; i <= NX; i++) {
    let t = i / NX;
    ctx.lineTo(tubeX + t * tubeW, tubeYBot(t));
  }
  ctx.stroke();

  // Fill tube interior with dark
  ctx.fillStyle = 'rgba(4, 4, 12, 0.7)';
  ctx.beginPath();
  ctx.moveTo(tubeX, tubeYTop(0));
  for (let i = 0; i <= NX; i++) { let t = i/NX; ctx.lineTo(tubeX + t * tubeW, tubeYTop(t)); }
  for (let i = NX; i >= 0; i--) { let t = i/NX; ctx.lineTo(tubeX + t * tubeW, tubeYBot(t)); }
  ctx.closePath();
  ctx.fill();

  // Plasma rendering (color = density + temperature, brightness = pressure)
  for (let i = 0; i < NX; i++) {
    let t = i / NX;
    let x = tubeX + t * tubeW;
    let yt = tubeYTop(t);
    let yb = tubeYBot(t);
    let w = tubeW / NX + 1;

    let r = rho[i];
    let v = vel[i];
    let p = prs[i];
    let b = Math.abs(bth[i]);

    // Temperature proxy
    let temp = p / Math.max(0.01, r);
    // Normalize for color — wider dynamic range
    let rn = Math.min(1, r / 3);
    let tn = Math.min(1, temp / 3);
    let vn = Math.min(1, Math.abs(v) / 8);

    // Plasma color: cool=blue, warm=purple/pink, hot=white
    let pr = Math.min(255, (80 + tn * 175 + vn * 120) | 0);
    let pg = Math.min(255, (30 + tn * 100 + vn * 80 + rn * 40) | 0);
    let pb = Math.min(255, (150 + rn * 105 - vn * 50) | 0);
    let alpha = Math.min(0.95, 0.3 + rn * 0.35 + tn * 0.25 + vn * 0.1);

    // Glow gradient from center
    let cy = (yt + yb) / 2;
    let hr = (yb - yt) / 2;
    if (hr > 2) {
      let grad = ctx.createRadialGradient(x, cy, 0, x, cy, hr);
      grad.addColorStop(0, `rgba(${pr},${pg},${pb},${alpha})`);
      grad.addColorStop(0.6, `rgba(${pr*0.6|0},${pg*0.4|0},${pb*0.7|0},${alpha*0.5})`);
      grad.addColorStop(1, `rgba(${pr*0.2|0},${pg*0.1|0},${pb*0.3|0},0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(x - 1, yt, w + 1, yb - yt);
    }

    // Magnetic field sheen (blue shimmer where B is strong)
    if (b > 0.5) {
      let ba = Math.min(0.3, b * 0.05);
      ctx.fillStyle = `rgba(80, 150, 255, ${ba})`;
      ctx.fillRect(x - 1, yt, w + 1, yb - yt);
    }
  }

  // Velocity arrows (every 15 cells)
  ctx.strokeStyle = 'rgba(255, 200, 100, 0.3)';
  ctx.fillStyle = 'rgba(255, 200, 100, 0.3)';
  for (let i = 10; i < NX - 10; i += 15) {
    let t = i / NX;
    let x = tubeX + t * tubeW;
    let cy = tubeY + tubeH / 2;
    let v = vel[i];
    let len = Math.min(Math.abs(v) * 3, 20);
    if (len < 2) continue;
    let dir = v > 0 ? 1 : -1;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x, cy);
    ctx.lineTo(x + len * dir, cy);
    ctx.lineTo(x + (len - 3) * dir, cy - 3);
    ctx.moveTo(x + len * dir, cy);
    ctx.lineTo(x + (len - 3) * dir, cy + 3);
    ctx.stroke();
  }

  // Draw coils
  for (let ci = 0; ci < coils.length; ci++) {
    let c = coils[ci];
    let x = tubeX + c.x * tubeW;
    let yt = tubeYTop(c.x);
    let yb = tubeYBot(c.x);

    // Coil body (ring around tube)
    ctx.strokeStyle = c.polarity > 0 ? 'rgba(255, 120, 60, 0.7)' : 'rgba(60, 120, 255, 0.7)';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(x, yt - 8);
    ctx.lineTo(x, yb + 8);
    ctx.stroke();

    // Coil caps
    ctx.fillStyle = c.polarity > 0 ? '#c44' : '#44c';
    ctx.fillRect(x - 6, yt - 12, 12, 6);
    ctx.fillRect(x - 6, yb + 6, 12, 6);

    // Strength indicator
    ctx.fillStyle = '#889';
    ctx.font = '9px monospace';
    ctx.fillText((c.strength * 10).toFixed(0), x - 6, yt - 16);

    // Field lines from coil
    let power = +document.getElementById('coil-power').value / 10;
    let b = c.strength * c.polarity * power;
    ctx.globalAlpha = Math.min(0.4, Math.abs(b) * 0.08);
    let cy = tubeY + tubeH / 2;
    for (let li = -3; li <= 3; li++) {
      let yo = li * 8;
      let spread = Math.abs(b) * 15;
      ctx.strokeStyle = b > 0 ? '#ff8844' : '#4488ff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - spread, cy + yo);
      ctx.quadraticCurveTo(x, cy + yo * 0.3, x + spread, cy + yo);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Inlet / Exhaust labels
  ctx.fillStyle = '#445';
  ctx.font = '11px monospace';
  ctx.fillText('INTAKE', tubeX, tubeY - 8);
  ctx.fillText('EXHAUST \u2192', tubeX + tubeW - 70, tubeY - 8);

  // Exhaust plume
  let vex = vel[NX - 1];
  let rex = rho[NX - 1];
  let pex = prs[NX - 1];
  if (vex > 1) {
    let plumeLen = Math.min(vex * 8, W * 0.15);
    let cy = tubeY + tubeH / 2;
    let exX = tubeX + tubeW;
    let exR = (tubeYBot(1) - tubeYTop(1)) / 2;
    let grad = ctx.createLinearGradient(exX, 0, exX + plumeLen, 0);
    let temp = pex / Math.max(0.01, rex);
    let hot = Math.min(1, temp / 10);
    grad.addColorStop(0, `rgba(${200+hot*55|0}, ${100+hot*100|0}, ${255-hot*100|0}, 0.5)`);
    grad.addColorStop(0.3, `rgba(${150+hot*50|0}, ${80+hot*80|0}, ${200-hot*80|0}, 0.25)`);
    grad.addColorStop(1, 'rgba(20, 10, 40, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(exX, cy - exR);
    ctx.quadraticCurveTo(exX + plumeLen * 0.5, cy - exR * 1.5, exX + plumeLen, cy);
    ctx.quadraticCurveTo(exX + plumeLen * 0.5, cy + exR * 1.5, exX, cy + exR);
    ctx.closePath();
    ctx.fill();
  }

  // Profile plots (small, bottom-left)
  drawProfile(rho, '#6cf', 'rho', 10, H - 80, 120, 50);
  drawProfile(vel, '#f84', 'vel', 140, H - 80, 120, 50);
  drawProfile(prs, '#8f6', 'prs', 270, H - 80, 120, 50);
  drawProfile(bth, '#fa6', 'B', 400, H - 80, 120, 50);
}

function drawProfile(arr, color, label, px, py, pw, ph) {
  let mn = Infinity, mx = -Infinity;
  for (let i = 0; i < NX; i++) { if (arr[i] < mn) mn = arr[i]; if (arr[i] > mx) mx = arr[i]; }
  let range = mx - mn || 1;

  ctx.strokeStyle = 'rgba(40,40,50,0.8)';
  ctx.lineWidth = 1;
  ctx.strokeRect(px, py, pw, ph);

  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i < NX; i++) {
    let x = px + (i / NX) * pw;
    let y = py + ph - ((arr[i] - mn) / range) * ph;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.fillStyle = color;
  ctx.font = '9px monospace';
  ctx.fillText(label, px + 2, py - 2);
  ctx.fillStyle = '#556';
  ctx.fillText(mx.toFixed(1), px + pw - 25, py - 2);
}

// ── Metrics ──
function updateMetrics() {
  let vex = vel[NX - 1];
  let rex = rho[NX - 1];
  let r_inlet = rho[0];
  let mdot = rex * vex;  // mass flow rate (arbitrary units)

  // Find max density (compression)
  let rmax = 0;
  for (let i = 0; i < NX; i++) if (rho[i] > rmax) rmax = rho[i];
  let comp = rmax / Math.max(0.01, r_inlet);

  let thrust = mdot * vex;  // thrust ~ mdot * vex
  let isp = vex / G0 * 1000;  // scale for display
  let eff = thrust > 0 ? Math.min(99, thrust / (+document.getElementById('arc-voltage').value / 10 + 1) * 10) : 0;

  document.getElementById('m-thrust').textContent = (thrust * 100).toFixed(1);
  document.getElementById('m-isp').textContent = isp.toFixed(0);
  document.getElementById('m-vex').textContent = (vex * 0.5).toFixed(1);
  document.getElementById('m-comp').textContent = comp.toFixed(1);
  document.getElementById('m-mdot').textContent = (mdot * 10).toFixed(2);

  document.getElementById('d-vex').textContent = (vex * 0.5).toFixed(1) + ' km/s';
  document.getElementById('d-isp').textContent = isp.toFixed(0) + ' s';
  document.getElementById('d-comp').textContent = comp.toFixed(1) + 'x';
  document.getElementById('d-eff').textContent = eff.toFixed(0) + '%';
}

// ── Main loop ──
let frameCount = 0;
function loop() {
  if (!paused) {
    for (let i = 0; i < 40; i++) simStep();
  }
  render();
  if (++frameCount % 5 === 0) updateMetrics();
  requestAnimationFrame(loop);
}

// Click to place coil
canvas.addEventListener('mousedown', function(e) {
  let mx = e.clientX, my = e.clientY;
  // Check if near existing coil
  for (let ci = 0; ci < coils.length; ci++) {
    let cx = tubeX + coils[ci].x * tubeW;
    if (Math.abs(mx - cx) < 15 && my > tubeYTop(coils[ci].x) - 20 && my < tubeYBot(coils[ci].x) + 20) {
      if (e.button === 2) { coils[ci].polarity *= -1; return; }
      dragCoil = ci;
      return;
    }
  }
  // Place new coil if inside tube area
  if (mx > tubeX && mx < tubeX + tubeW && my > tubeY - 30 && my < tubeY + tubeH + 30) {
    let t = (mx - tubeX) / tubeW;
    coils.push({x: t, strength: 3 + Math.random() * 3, polarity: 1});
  }
});
canvas.addEventListener('mousemove', function(e) {
  if (dragCoil >= 0) {
    coils[dragCoil].x = Math.max(0.02, Math.min(0.98, (e.clientX - tubeX) / tubeW));
  }
});
canvas.addEventListener('mouseup', function() { dragCoil = -1; });
canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });
canvas.addEventListener('wheel', function(e) {
  // Scroll on a coil changes its strength
  for (let ci = 0; ci < coils.length; ci++) {
    let cx = tubeX + coils[ci].x * tubeW;
    if (Math.abs(e.clientX - cx) < 20) {
      coils[ci].strength = Math.max(0.5, Math.min(10, coils[ci].strength - e.deltaY * 0.01));
      e.preventDefault();
      return;
    }
  }
});

// Touch events (mobile coil placement/dragging)
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  let touch = e.touches[0];
  let mx = touch.clientX, my = touch.clientY;
  // Check if near existing coil
  for (let ci = 0; ci < coils.length; ci++) {
    let cx = tubeX + coils[ci].x * tubeW;
    if (Math.abs(mx - cx) < 20 && my > tubeYTop(coils[ci].x) - 25 && my < tubeYBot(coils[ci].x) + 25) {
      dragCoil = ci;
      return;
    }
  }
  // Place new coil if inside tube area
  if (mx > tubeX && mx < tubeX + tubeW && my > tubeY - 30 && my < tubeY + tubeH + 30) {
    let t = (mx - tubeX) / tubeW;
    coils.push({x: t, strength: 3 + Math.random() * 3, polarity: 1});
  }
}, {passive: false});
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (dragCoil >= 0) {
    let touch = e.touches[0];
    coils[dragCoil].x = Math.max(0.02, Math.min(0.98, (touch.clientX - tubeX) / tubeW));
  }
}, {passive: false});
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  dragCoil = -1;
}, {passive: false});

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('btn-play').click(); }
  if (e.code === 'KeyR') { document.getElementById('btn-reset').click(); }
  if (e.code === 'Delete' || e.code === 'Backspace') { coils.pop(); e.preventDefault(); }
});

loop();
</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RAIL PLASMA — 2D MHD Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080c;color:#c0c0c0;font-family:ui-monospace,'SF Mono',Menlo,monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column}
canvas{display:block;image-rendering:pixelated;cursor:crosshair}
#top{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#0c0c12;border-bottom:1px solid #1a1a24}
#title{font-size:15px;color:#e0e0e8;letter-spacing:2px}
#title span{color:#556;font-size:11px;letter-spacing:1px}
#diag{font-size:11px;color:#667;display:flex;gap:20px}
.dv{color:#8af}.de{color:#fa8}.db{color:#f8a}.dr{color:#8fa}
#mid{flex:1;display:flex;justify-content:center;align-items:center;position:relative}
#bottom{padding:8px 16px;background:#0c0c12;border-top:1px solid #1a1a24;display:flex;gap:16px;align-items:center;flex-wrap:wrap;font-size:11px}
#bottom label{color:#667}
#bottom select,#bottom input[type=range]{background:#151520;border:1px solid #2a2a36;color:#aab;font-family:inherit;font-size:11px}
#bottom select{padding:2px 4px;border-radius:3px}
#bottom input[type=range]{width:80px;height:4px;-webkit-appearance:none;appearance:none;border-radius:2px}
#bottom input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#c9a84c;border-radius:50%;cursor:pointer}
.btn{background:#1a1a28;border:1px solid #2a2a3a;color:#aab;padding:3px 10px;font-family:inherit;font-size:11px;cursor:pointer;border-radius:3px}
.btn:hover{background:#252538;border-color:#3a3a4a}
.btn.active{background:#2a1a1a;border-color:#c9a84c;color:#c9a84c}
#overlay{position:absolute;bottom:12px;right:12px;font-size:10px;color:#445;text-align:right;pointer-events:none}
#field-label{position:absolute;top:8px;left:8px;font-size:12px;color:#556;pointer-events:none}
@media(max-width:800px){
  body{overflow:auto;height:auto}
  #top{flex-direction:column;gap:4px;padding:6px 10px}
  #mid{min-height:300px}
  #bottom{flex-wrap:wrap;gap:8px;padding:6px 10px}
  #bottom input[type=range]{height:6px}
  #bottom input[type=range]::-webkit-slider-thumb{width:18px;height:18px}
  #bottom label{font-size:11px}
  .btn{padding:6px 12px;font-size:12px}
  #diag{flex-wrap:wrap;gap:8px 14px;font-size:11px}
  #overlay{font-size:9px}
  canvas{touch-action:none}
}
</style>
</head>
<body>
<div id="top">
  <div id="title">RAIL PLASMA <span>2D MHD &middot; Orszag-Tang Vortex &middot; WebAssembly</span></div>
  <div id="diag">
    <span>step <span id="d-step">0</span></span>
    <span>t=<span class="dv" id="d-time">0.000</span></span>
    <span>dt=<span class="dv" id="d-dt">0.000</span></span>
    <span>&delta;m=<span class="de" id="d-mass">0</span></span>
    <span>&delta;E=<span class="db" id="d-energy">0</span></span>
    <span>&rho;<sub>min</sub>=<span class="dr" id="d-rho">0</span></span>
  </div>
</div>
<div id="mid">
  <canvas id="c"></canvas>
  <div id="field-label">Density &rho;</div>
  <div id="overlay">click to perturb<br>SPACE pause &middot; R reset</div>
</div>
<div id="bottom">
  <button class="btn active" id="btn-play">&#9654; Play</button>
  <button class="btn" id="btn-reset">Reset</button>
  <label>Speed: <input type="range" id="speed" min="1" max="20" value="4"><span id="speed-val">4</span></label>
  <label>Field:
    <select id="field">
      <option value="rho" selected>Density &rho;</option>
      <option value="vmag">Velocity |v|</option>
      <option value="bmag">Magnetic |B|</option>
      <option value="pressure">Pressure p</option>
      <option value="current">Current |j|</option>
      <option value="composite">Composite</option>
    </select>
  </label>
  <label>Palette:
    <select id="palette">
      <option value="plasma" selected>Plasma</option>
      <option value="viridis">Viridis</option>
      <option value="inferno">Inferno</option>
      <option value="hot">Hot</option>
    </select>
  </label>
  <label>Scale: <input type="range" id="scale" min="1" max="6" value="4"><span id="scale-val">4</span>x</label>
</div>

<script>
const WASM_B64 = "AGFzbQEAAAABRAxgAXwBfGABfwF/YAN/f38Bf2AEf39/fwF8YAV/f39/fABgAn9/AGAAAGADf39/AXxgAX8BfGADf398AGAAAXxgAAF/AiMDBG1hdGgDc2luAAAEbWF0aANjb3MAAARtYXRoBHNxcnQAAAMZGAECAwQFBgcHCAkDAwoGCgsKCgoKCwsLCQUDAQAeBqUBEH8BQYABC38BQYCAAQt/AUGAgAYLfABEq6qqqqqq+j8LfABEVlVVVVVV5T8LfwFBgIAwC3wBRAAAAAAAAAAAC3wBRAAAAAAAAAAAC3wBRAAAAAAAAAAAC3wBRAAAAAAAAAAAC3wBRAAAAAAAAAAAC38BQQALfAFEAAAAAAAAAAALfABEGC1EVPshqT8LfABEGC1EVPshuT8LfABEmpmZmZmZyT8LB6EBDgZtZW1vcnkCAARpbml0AAgEc3RlcAAPE2NvbXB1dGVfZGlhZ25vc3RpY3MAEAhnZXRfdGltZQARCGdldF9zdGVwABIGZ2V0X2R0ABMIZ2V0X21hc3MAFApnZXRfZW5lcmd5ABULZ2V0X21pbl9yaG8AFgZnZXRfbm4AFwdnZXRfbm4yABgOZ2V0X3N0YXRlX3NpemUAGQdwZXJ0dXJiABoKlRAYIAAgAEEASAR/IAAjAGoFIAAjAE4EfyAAIwBrBSAACwsLFAAgACMBbCACEAMjAGxqIAEQA2oLEwAgACABIAIgAxAEQQhsaisDAAsVACAAIAEgAiADEARBCGxqIAQ5AwAL7AEBC3wgALcjDaIhAiABtyMNoiEDRJPjOI7jOAZAIQREAAAAAAAAAAAgAxAAoSEFIAIQACEGRAAAAAAAAAAAIAMQAKEhB0QAAAAAAAAAQCACohAAIQhEq6qqqqqq+j8hCUQAAAAAAADgPyAEoiAFIAWiIAYgBqKgoiEKRAAAAAAAAOA/IAcgB6IgCCAIoqCiIQsgCSMEoyAKoCALoCEMQQBBACAAIAEgBBAGQQBBASAAIAEgBCAFohAGQQBBAiAAIAEgBCAGohAGQQBBAyAAIAEgBxAGQQBBBCAAIAEgCBAGQQBBBSAAIAEgDBAGC00BA38jAUEIbEEGbCQFQQAhAAJAA0AgACMBTg0BIAAjAG8hASAAIwBtIQIgASACEAcgAEEBaiEADAALC0QAAAAAAAAAACQKQQAkCxAQC6sBAQl8IABBACABIAIQBSEDIABBASABIAIQBSEEIABBAiABIAIQBSEFIABBAyABIAIQBSEGIABBBCABIAIQBSEHIABBBSABIAIQBSEIIAQgBKIgBSAFoqAgAyADoqMhCSAGIAaiIAcgB6KgIQojBCAIRAAAAAAAAOA/IAOiIAmioUQAAAAAAADgPyAKoqGiIQsgC0S7vdfZ33zbPWMEfES7vdfZ33zbPQUgCwsLiwEBC3wgAEEAIAEgAhAFIQMgAEEBIAEgAhAFIQQgAEECIAEgAhAFIQUgAEEDIAEgAhAFIQYgAEEEIAEgAhAFIQcgACABIAIQCSEIIAQgA6MhCSAFIAOjIQogBiAGoiAHIAeioCELIwMgCKIgA6MhDCALIAOjIQ0gCSAJoiAKIAqioBACIAwgDaAQAqALSQIBfwJ8RAAAAAAAAAAAIQJBACEBAkADQCABIwFODQEgACABIwBvIAEjAG0QCiEDIAMgAmQEQCADIQILIAFBAWohAQwACwsgAgv3AQIEfyx8IAIjDqMhByACIw6jIQhBACEDAkADQCADIwFODQEgAyMAbyEEIAMjAG0hBUEAIQYCQANAIAZBBk4NASAAIAYgBEEBayAFEAUgACAGIARBAWogBRAFoCAAIAYgBCAFQQFrEAWgIAAgBiAEIAVBAWoQBaBEAAAAAAAAEECjIRkgACAEQQFqIAUgBhANIRUgACAEQQFrIAUgBhANIRYgACAEIAVBAWogBhAOIRcgACAEIAVBAWsgBhAOIRggGSAHIBUgFqGioSAIIBcgGKGioSEaIAEgBiAEIAUgGhAGIAZBAWohBgwACwsgA0EBaiEDDAALCwv5AQEMfCAAQQAgASACEAUhBCAAQQEgASACEAUhBSAAQQIgASACEAUhBiAAQQMgASACEAUhByAAQQQgASACEAUhCCAAQQUgASACEAUhCSAFIASjIQogBiAEoyELIAcgB6IgCCAIoqAhDCAAIAEgAhAJIQ0gDUQAAAAAAADgPyAMoqAhDiAKIAeiIAsgCKKgIQ8gA0EARgR8IAUFIANBAUYEfCAFIAqiIA6gIAcgB6KhBSADQQJGBHwgBSALoiAHIAiioQUgA0EDRgR8RAAAAAAAAAAABSADQQRGBHwgCiAIoiALIAeioQUgCSAOoCAKoiAHIA+ioQsLCwsLC/kBAQx8IABBACABIAIQBSEEIABBASABIAIQBSEFIABBAiABIAIQBSEGIABBAyABIAIQBSEHIABBBCABIAIQBSEIIABBBSABIAIQBSEJIAUgBKMhCiAGIASjIQsgByAHoiAIIAiioCEMIAAgASACEAkhDSANRAAAAAAAAOA/IAyioCEOIAogB6IgCyAIoqAhDyADQQBGBHwgBgUgA0EBRgR8IAYgCqIgByAIoqEFIANBAkYEfCAGIAuiIA6gIAggCKKhBSADQQNGBHwgCyAHoiAKIAiioQUgA0EERgR8RAAAAAAAAAAABSAJIA6gIAuiIAggD6KhCwsLCwsLegICfAF/QQAQCyEAIABEFlbnnq8D0jxjBEBE/Knx0k1iUD8hAQUjDyMNoiAAoyEBCyABJAxBACMFIAEQDEEAIQICQANAIAIjAk4NASACQQhsIwUgAkEIbGorAwA5AwAgAkEBaiECDAALCyMKIAGgJAojC0EBaiQLIAELfQIBfwR8RAAAAAAAAAAAIQFEAAAAAAAAAAAhAkTqjKA5WT4pRiEEQQAhAAJAA0AgACMBTg0BIABBCGwrAwAhAyABIAOgIQEgAkEFIwFsIABqQQhsKwMAoCECIAMgBGMEQCADIQQLIABBAWohAAwACwsgASQGIAIkByAEJAkLBAAjCgsEACMLCwQAIwwLBAAjBgsEACMHCwQAIwkLBAAjAAsEACMBCwQAIwIL3QECBH8DfEF9IQUCQANAIAVBBE4NAUF9IQYCQANAIAZBBE4NASAAIAVqIQMgASAGaiEEIAW3IAW3oiAGtyAGt6KgIQcgAkQAAAAAAAAAACAHRAAAAAAAAABAo6EaGiACRAAAAAAAAPA/IAdEAAAAAAAAIkCjoaIhCCAIRAAAAAAAAAAAZARAQQBBACADIAQQBSEJQQBBACADIAQgCSAIoBAGQQBBBSADIAQQBSEJQQBBBSADIAQgCSAIRAAAAAAAAAhAoqAQBgsgBkEBaiEGDAALCyAFQQFqIQUMAAsLCw==";

// ── Colormaps ──
function plasma(t) {
  t = Math.max(0, Math.min(1, t));
  const r = Math.min(255, Math.max(0, (0.050+2.68*t-1.36*t*t)*255|0));
  const g = Math.min(255, Math.max(0, (-0.02+0.34*t+2.20*t*t-2.54*t*t*t)*255|0));
  const b = Math.min(255, Math.max(0, (0.53+1.74*t-4.28*t*t+2.88*t*t*t)*255|0));
  return [r, g, b];
}
function viridis(t) {
  t = Math.max(0, Math.min(1, t));
  const r = (0.267+0.004*t+1.42*t*t-0.76*t*t*t)*255|0;
  const g = (0.004+1.01*t-0.30*t*t)*255|0;
  const b = (0.329+1.68*t-4.32*t*t+3.10*t*t*t)*255|0;
  return [Math.max(0,Math.min(255,r)), Math.max(0,Math.min(255,g)), Math.max(0,Math.min(255,b))];
}
function inferno(t) {
  t = Math.max(0, Math.min(1, t));
  const r = Math.min(255, Math.max(0, (-0.02+3.10*t-2.10*t*t)*255|0));
  const g = Math.min(255, Math.max(0, (-0.05+0.23*t+4.17*t*t-4.65*t*t*t)*255|0));
  const b = Math.min(255, Math.max(0, (0.01+3.07*t-8.67*t*t+6.23*t*t*t)*255|0));
  return [r, g, b];
}
function hot(t) {
  t = Math.max(0, Math.min(1, t));
  return [Math.min(255, t*3*255|0), Math.min(255, Math.max(0,(t*3-1)*255|0)), Math.min(255, Math.max(0,(t*3-2)*255|0))];
}
const colormaps = { plasma, viridis, inferno, hot };

// ── State ──
let wasm, memory, f64View;
let nn, nn2, stateSize;
let running = true;
let stepsPerFrame = 4;
let fieldMode = 'rho';
let paletteMode = 'plasma';
let pixelScale = 4;
let mass0, energy0;

async function init() {
  const bytes = Uint8Array.from(atob(WASM_B64), c => c.charCodeAt(0));
  const importObj = {
    math: { sin: Math.sin, cos: Math.cos, sqrt: Math.sqrt }
  };
  const result = await WebAssembly.instantiate(bytes, importObj);
  wasm = result.instance.exports;
  memory = wasm.memory;

  wasm.init();
  nn = wasm.get_nn();
  nn2 = wasm.get_nn2();
  stateSize = wasm.get_state_size();
  f64View = new Float64Array(memory.buffer);
  mass0 = wasm.get_mass();
  energy0 = wasm.get_energy();
  resize();
  window.addEventListener('resize', resize);
  requestAnimationFrame(loop);
}

function resize() {
  const canvas = document.getElementById('c');
  const maxW = Math.max(300, window.innerWidth);
  const maxH = Math.max(300, window.innerHeight);
  const desiredW = nn * pixelScale;
  const desiredH = nn * pixelScale;
  canvas.width = Math.min(desiredW, maxW);
  canvas.height = Math.min(desiredH, maxH);
  canvas.style.touchAction = 'none';
}

function getField(x, y) {
  if (fieldMode === 'rho') return f64View[0 * nn2 + y * nn + x];
  if (fieldMode === 'vmag') {
    const rho = f64View[0 * nn2 + y * nn + x];
    const mx = f64View[1 * nn2 + y * nn + x];
    const my = f64View[2 * nn2 + y * nn + x];
    return Math.sqrt(mx*mx + my*my) / rho;
  }
  if (fieldMode === 'bmag') {
    const bx = f64View[3 * nn2 + y * nn + x];
    const by = f64View[4 * nn2 + y * nn + x];
    return Math.sqrt(bx*bx + by*by);
  }
  if (fieldMode === 'pressure') {
    const rho = f64View[0 * nn2 + y * nn + x];
    const mx = f64View[1 * nn2 + y * nn + x];
    const my = f64View[2 * nn2 + y * nn + x];
    const bx = f64View[3 * nn2 + y * nn + x];
    const by = f64View[4 * nn2 + y * nn + x];
    const e = f64View[5 * nn2 + y * nn + x];
    const v2 = (mx*mx + my*my) / (rho*rho);
    const b2 = bx*bx + by*by;
    return 0.6666666667 * (e - 0.5*rho*v2 - 0.5*b2);
  }
  if (fieldMode === 'current') {
    const dx = 0.04908738521234052;
    const xp = (x+1) % nn, xm = (x-1+nn) % nn;
    const yp = (y+1) % nn, ym = (y-1+nn) % nn;
    const dBydx = (f64View[4*nn2 + y*nn + xp] - f64View[4*nn2 + y*nn + xm]) / (2*dx);
    const dBxdy = (f64View[3*nn2 + yp*nn + x] - f64View[3*nn2 + ym*nn + x]) / (2*dx);
    return Math.abs(dBydx - dBxdy);
  }
  if (fieldMode === 'composite') return null; // handled separately
  return f64View[0 * nn2 + y * nn + x];
}

function render() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(nn, nn);
  const data = imgData.data;
  const cmap = colormaps[paletteMode];
  const dx = 0.04908738521234052;

  if (fieldMode === 'composite') {
    // 3-channel: blue=density, amber=|B|^2, pink=|j|
    for (let y = 0; y < nn; y++) {
      for (let x = 0; x < nn; x++) {
        const rho = f64View[0*nn2 + y*nn + x];
        const bx = f64View[3*nn2 + y*nn + x];
        const by = f64View[4*nn2 + y*nn + x];
        const b2 = bx*bx + by*by;
        const xp=(x+1)%nn, xm=(x-1+nn)%nn, yp=(y+1)%nn, ym=(y-1+nn)%nn;
        const jz = Math.abs((f64View[4*nn2+y*nn+xp]-f64View[4*nn2+y*nn+xm])/(2*dx) -
                            (f64View[3*nn2+yp*nn+x]-f64View[3*nn2+ym*nn+x])/(2*dx));
        const rd = Math.min(1, (rho - 1.0) / 3.0);
        const rb = Math.min(1, b2 / 4.0);
        const rj = Math.min(1, jz / 40.0);
        const i = (y * nn + x) * 4;
        data[i]   = Math.min(255, (rd*60 + rb*230 + rj*255)|0);
        data[i+1] = Math.min(255, (rd*140 + rb*160 + rj*50)|0);
        data[i+2] = Math.min(255, (rd*220 + rb*30 + rj*180)|0);
        data[i+3] = 255;
      }
    }
  } else {
    let fmin = Infinity, fmax = -Infinity;
    const buf = new Float64Array(nn2);
    for (let y = 0; y < nn; y++) {
      for (let x = 0; x < nn; x++) {
        const v = getField(x, y);
        buf[y*nn+x] = v;
        if (v < fmin) fmin = v;
        if (v > fmax) fmax = v;
      }
    }
    const range = fmax - fmin || 1;
    for (let y = 0; y < nn; y++) {
      for (let x = 0; x < nn; x++) {
        const t = (buf[y*nn+x] - fmin) / range;
        const [r, g, b] = cmap(t);
        const i = (y * nn + x) * 4;
        data[i] = r; data[i+1] = g; data[i+2] = b; data[i+3] = 255;
      }
    }
  }

  // Scale up using temp canvas (OffscreenCanvas not reliable in Safari)
  if (!window._tmpCanvas) {
    window._tmpCanvas = document.createElement('canvas');
    window._tmpCanvas.width = nn;
    window._tmpCanvas.height = nn;
  }
  const tctx = window._tmpCanvas.getContext('2d');
  tctx.putImageData(imgData, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(window._tmpCanvas, 0, 0, canvas.width, canvas.height);
}

function updateDiag() {
  wasm.compute_diagnostics();
  document.getElementById('d-step').textContent = wasm.get_step();
  document.getElementById('d-time').textContent = wasm.get_time().toFixed(4);
  document.getElementById('d-dt').textContent = wasm.get_dt().toExponential(2);
  const mass = wasm.get_mass();
  const energy = wasm.get_energy();
  document.getElementById('d-mass').textContent = ((mass - mass0) / mass0).toExponential(2);
  document.getElementById('d-energy').textContent = ((energy - energy0) / energy0).toExponential(2);
  document.getElementById('d-rho').textContent = wasm.get_min_rho().toFixed(3);
}

function loop() {
  try {
    if (running) {
      for (let i = 0; i < stepsPerFrame; i++) wasm.step();
    }
    render();
    if (wasm.get_step() % 10 === 0) updateDiag();
    requestAnimationFrame(loop);
  } catch(e) {
    console.error('MHD loop error:', e);
    document.getElementById('field-label').textContent = 'ERROR: ' + e.message;
    document.getElementById('field-label').style.color = '#f55';
  }
}

// ── Controls ──
document.getElementById('btn-play').onclick = function() {
  running = !running;
  this.textContent = running ? '\u25B6 Play' : '\u275A\u275A Pause';
  this.classList.toggle('active', running);
};
document.getElementById('btn-reset').onclick = function() {
  wasm.init();
  mass0 = wasm.get_mass();
  energy0 = wasm.get_energy();
  f64View = new Float64Array(memory.buffer);
  updateDiag();
};
document.getElementById('speed').oninput = function() {
  stepsPerFrame = +this.value;
  document.getElementById('speed-val').textContent = this.value;
};
document.getElementById('field').onchange = function() {
  fieldMode = this.value;
  const labels = {rho:'Density \u03C1',vmag:'Velocity |v|',bmag:'Magnetic |B|',pressure:'Pressure p',current:'Current |j|',composite:'Composite'};
  document.getElementById('field-label').textContent = labels[fieldMode] || '';
};
document.getElementById('palette').onchange = function() { paletteMode = this.value; };
document.getElementById('scale').oninput = function() {
  pixelScale = +this.value;
  document.getElementById('scale-val').textContent = this.value;
  resize();
};

// Click to perturb
document.getElementById('c').addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / rect.width * nn);
  const y = Math.floor((e.clientY - rect.top) / rect.height * nn);
  if (x >= 0 && x < nn && y >= 0 && y < nn) {
    wasm.perturb(x, y, 2.0);
  }
});

// Touch to perturb (mobile)
document.getElementById('c').addEventListener('touchstart', function(e) {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = this.getBoundingClientRect();
  const x = Math.floor((touch.clientX - rect.left) / rect.width * nn);
  const y = Math.floor((touch.clientY - rect.top) / rect.height * nn);
  if (x >= 0 && x < nn && y >= 0 && y < nn) {
    wasm.perturb(x, y, 2.0);
  }
}, { passive: false });

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space') {
    e.preventDefault();
    document.getElementById('btn-play').click();
  }
  if (e.code === 'KeyR') {
    document.getElementById('btn-reset').click();
  }
});

init().catch(e => {
  console.error('MHD init failed:', e);
  document.getElementById('field-label').textContent = 'ERROR: ' + e.message;
  document.getElementById('field-label').style.color = '#f55';
});
</script>
</body>
</html>

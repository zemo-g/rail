<!DOCTYPE html>
<html>
<head>
<title>RAIL PLASMA LAB</title>
<style>
  body { margin: 0; background: #0a0a0f; overflow: hidden; font-family: monospace; }
  canvas { display: block; margin: 0 auto; cursor: crosshair; }
  #info { position: fixed; top: 10px; left: 10px; color: #556; font-size: 12px; }
  #controls { position: fixed; bottom: 10px; left: 10px; color: #889; font-size: 13px; }
  #title { position: fixed; top: 10px; right: 10px; color: #445; font-size: 14px; text-align: right; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info"></div>
<div id="controls">
  <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center;">
    <label>Ring Magnets: <input type="range" id="ringCount" min="0" max="30" value="0" style="width:120px"><span id="ringCountVal">0</span></label>
    <label>Ring Radius: <input type="range" id="ringDist" min="20" max="150" value="60" style="width:100px"><span id="ringDistVal">60</span></label>
    <label>Ring Position: <input type="range" id="ringPos" min="10" max="90" value="50" style="width:100px"><span id="ringPosVal">50</span>%</label>
    <label>Spin Speed: <input type="range" id="spinSpeed" min="0" max="100" value="30" style="width:100px"><span id="spinSpeedVal">3.0</span></label>
    <label>Field Power: <input type="range" id="fieldPow" min="1" max="50" value="10" style="width:100px"><span id="fieldPowVal">1.0</span></label>
    <label>Polarity: <select id="polarity"><option value="all">All Same</option><option value="alt" selected>Alternating N/S</option><option value="quad">Quadrupole</option><option value="hex">Sextupole</option><option value="random">Random</option></select></label>
  </div>
  <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-top:6px;">
    <label>Arcs: <input type="range" id="arcCount" min="1" max="6" value="1" style="width:80px"><span id="arcCountVal">1</span></label>
    <label>Voltage: <input type="range" id="voltage" min="1" max="50" value="15" style="width:100px"><span id="voltageVal">1.5</span>kV</label>
    <label>Gas: <input type="range" id="pressure" min="1" max="100" value="30" style="width:100px"><span id="pressureVal">30</span>%</label>
    <label>Preset: <select id="preset">
      <option value="">— Load Preset —</option>
      <option value="pinch">θ-Pinch</option>
      <option value="mirror">Magnetic Mirror</option>
      <option value="cusp">Cusp Trap</option>
      <option value="tokamak">Tokamak Ring</option>
      <option value="reconnect">Reconnection</option>
      <option value="quadrupole">Quadrupole Field</option>
    </select></label>
    <button id="resetArcs" style="background:#223;color:#aab;border:1px solid #445;padding:4px 10px;font-family:monospace;cursor:pointer;">Reset Arcs</button>
    <button id="clearAll" style="background:#322;color:#baa;border:1px solid #544;padding:4px 10px;font-family:monospace;cursor:pointer;">Clear All</button>
  </div>
  <div style="margin-top:4px;color:#556;">CLICK place magnet | DRAG move | RIGHT-CLICK flip | DEL remove | SPACE pause | R reset arcs</div>
</div>
<div id="title">RAIL PLASMA LAB<br><span style="color:#334;font-size:11px">magnetohydrodynamic arc simulator</span></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');

// Slider refs
const sliderRingCount = document.getElementById('ringCount');
const sliderRingDist = document.getElementById('ringDist');
const sliderSpinSpeed = document.getElementById('spinSpeed');
const sliderFieldPow = document.getElementById('fieldPow');
const sliderRingPos = document.getElementById('ringPos');
const selectPolarity = document.getElementById('polarity');
const sliderArcCount = document.getElementById('arcCount');
const sliderVoltage = document.getElementById('voltage');
const sliderPressure = document.getElementById('pressure');
const selectPreset = document.getElementById('preset');
const btnResetArcs = document.getElementById('resetArcs');
const btnClearAll = document.getElementById('clearAll');

// Layout
let W, H, tubeX, tubeY, tubeW, tubeH;
let electrodeLeft = 0.15; // 0-1 fraction from left edge
let electrodeRight = 0.85; // 0-1 fraction from left edge
let dragElectrode = null; // 'left' or 'right' or null

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  tubeW = W * 0.7;
  tubeH = H * 0.25;
  tubeX = (W - tubeW) / 2;
  tubeY = (H - tubeH) / 2;
}
resize();
window.addEventListener('resize', resize);

function getElectrodeX(frac) { return tubeX + frac * tubeW; }

// Multiple arcs — each is a chain of particles
const N = 80;
let arcs = []; // array of arc chains
let sparks = []; // particle effects
function resetArc() {
  arcs = [];
  let count = getArcCount();
  let lx = getElectrodeX(electrodeLeft);
  let rx = getElectrodeX(electrodeRight);
  let cy = tubeY + tubeH / 2;
  for (let a = 0; a < count; a++) {
    let arc = [];
    // Stagger arcs vertically
    let yOffset = (count > 1) ? (a - (count-1)/2) * 6 : 0;
    for (let i = 0; i < N; i++) {
      let t = i / (N - 1);
      arc.push({
        x: lx + t * (rx - lx),
        y: cy + yOffset + (Math.random() - 0.5) * 3,
        vx: 0, vy: 0
      });
    }
    arcs.push(arc);
  }
  sparks = [];
}
resetArc();

// Magnets
let magnets = [];
let dragIdx = -1;
let spinAngle = 0;
let paused = false;

// Read slider values
function getRingCount() { return parseInt(sliderRingCount.value); }
function getRingDist() { return parseInt(sliderRingDist.value); }
function getRingPos() { return parseInt(sliderRingPos.value) / 100; } // 0-1 along tube
function getSpinSpeed() { return parseInt(sliderSpinSpeed.value) / 10; }
function getFieldStrength() { return parseInt(sliderFieldPow.value) / 10; }
function getArcCount() { return parseInt(sliderArcCount.value); }
function getVoltage() { return parseInt(sliderVoltage.value) / 10; }
function getPressure() { return parseInt(sliderPressure.value) / 100; }

// Update labels
function updateLabels() {
  document.getElementById('ringCountVal').textContent = getRingCount();
  document.getElementById('ringDistVal').textContent = getRingDist();
  document.getElementById('ringPosVal').textContent = (getRingPos() * 100).toFixed(0);
  document.getElementById('spinSpeedVal').textContent = getSpinSpeed().toFixed(1);
  document.getElementById('fieldPowVal').textContent = getFieldStrength().toFixed(1);
  document.getElementById('arcCountVal').textContent = getArcCount();
  document.getElementById('voltageVal').textContent = getVoltage().toFixed(1);
  document.getElementById('pressureVal').textContent = (getPressure() * 100).toFixed(0);
}
sliderRingCount.addEventListener('input', updateLabels);
sliderRingDist.addEventListener('input', updateLabels);
sliderRingPos.addEventListener('input', updateLabels);
sliderSpinSpeed.addEventListener('input', updateLabels);
sliderFieldPow.addEventListener('input', updateLabels);
sliderArcCount.addEventListener('input', () => { updateLabels(); resetArc(); });
sliderVoltage.addEventListener('input', updateLabels);
sliderPressure.addEventListener('input', updateLabels);
btnResetArcs.addEventListener('click', resetArc);
btnClearAll.addEventListener('click', () => { magnets = []; sliderRingCount.value = 0; updateLabels(); resetArc(); });
selectPreset.addEventListener('change', loadPreset);

// Presets — pre-built field configurations
function loadPreset() {
  let p = selectPreset.value;
  if (!p) return;
  magnets = [];
  let cy = tubeY + tubeH / 2;
  let lx = getElectrodeX(electrodeLeft);
  let rx = getElectrodeX(electrodeRight);
  let mid = (lx + rx) / 2;
  let span = rx - lx;

  if (p === 'pinch') {
    // θ-pinch: ring of magnets compressing the arc
    sliderRingCount.value = 12;
    sliderRingDist.value = 50;
    sliderRingPos.value = 50;
    sliderSpinSpeed.value = 0;
    sliderFieldPow.value = 25;
    selectPolarity.value = 'all';
    sliderArcCount.value = 1;
  } else if (p === 'mirror') {
    // Magnetic mirror: two coils on either end
    sliderRingCount.value = 8;
    sliderRingDist.value = 60;
    sliderRingPos.value = 25;
    sliderSpinSpeed.value = 0;
    sliderFieldPow.value = 20;
    selectPolarity.value = 'all';
    // Add second mirror coil via manual magnets in a ring
    for (let i = 0; i < 8; i++) {
      let a = (i / 8) * Math.PI * 2;
      magnets.push({
        x: lx + 0.75 * span,
        y: cy + Math.sin(a) * 50,
        mx: 0,
        my: -Math.sin(a) * 0.8
      });
    }
    sliderArcCount.value = 1;
  } else if (p === 'cusp') {
    // Cusp: ring with alternating polarity
    sliderRingCount.value = 12;
    sliderRingDist.value = 55;
    sliderRingPos.value = 50;
    sliderSpinSpeed.value = 5;
    sliderFieldPow.value = 30;
    selectPolarity.value = 'alt';
    sliderArcCount.value = 2;
  } else if (p === 'tokamak') {
    // Tokamak-like: spinning ring + toroidal-ish
    sliderRingCount.value = 20;
    sliderRingDist.value = 70;
    sliderRingPos.value = 50;
    sliderSpinSpeed.value = 80;
    sliderFieldPow.value = 15;
    selectPolarity.value = 'alt';
    sliderArcCount.value = 3;
  } else if (p === 'reconnect') {
    // Magnetic reconnection: two opposing magnets
    magnets.push({ x: mid - 50, y: cy - 30, mx: 0, my: 1 });
    magnets.push({ x: mid + 50, y: cy - 30, mx: 0, my: -1 });
    magnets.push({ x: mid - 50, y: cy + 30, mx: 0, my: -1 });
    magnets.push({ x: mid + 50, y: cy + 30, mx: 0, my: 1 });
    sliderRingCount.value = 0;
    sliderFieldPow.value = 25;
    sliderArcCount.value = 2;
  } else if (p === 'quadrupole') {
    // 4 magnets in a square
    magnets.push({ x: mid - 70, y: cy - 50, mx: 0.7, my: 0.7 });
    magnets.push({ x: mid + 70, y: cy - 50, mx: -0.7, my: 0.7 });
    magnets.push({ x: mid - 70, y: cy + 50, mx: 0.7, my: -0.7 });
    magnets.push({ x: mid + 70, y: cy + 50, mx: -0.7, my: -0.7 });
    sliderRingCount.value = 0;
    sliderFieldPow.value = 30;
    sliderArcCount.value = 1;
  }
  updateLabels();
  resetArc();
  selectPreset.value = '';
}

// Physics
function dipoleField(mx, my, px, py, x, y) {
  let dx = x - px, dy = y - py;
  let r2 = dx*dx + dy*dy + 400;
  let r = Math.sqrt(r2);
  let r3 = r * r2;
  let r5 = r3 * r2;
  let mdotr = mx*dx + my*dy;
  return {
    bx: (3*mdotr*dx/r5 - mx/r3) * 50000,
    by: (3*mdotr*dy/r5 - my/r3) * 50000
  };
}

function getMagnetPolarity(i, n) {
  let mode = selectPolarity.value;
  if (mode === 'all') return 1;
  if (mode === 'alt') return i % 2 === 0 ? 1 : -1;
  if (mode === 'quad') return (i % (Math.max(1, Math.floor(n/4)))) < Math.floor(n/8+1) ? 1 : -1;
  if (mode === 'hex') {
    let sixth = n / 6;
    return Math.floor(i / Math.max(1, sixth)) % 2 === 0 ? 1 : -1;
  }
  if (mode === 'random') {
    // Deterministic "random" based on index
    return ((i * 7 + 3) % 11) > 5 ? 1 : -1;
  }
  return 1;
}

function totalField(x, y) {
  let bx = 0, by = 0;
  let fs = getFieldStrength();

  // Manual magnets
  for (let m of magnets) {
    let f = dipoleField(m.mx, m.my, m.x, m.y, x, y);
    bx += f.bx * fs;
    by += f.by * fs;
  }

  // Ring magnets — circle the tube cross-section at a fixed x position
  // In 2D side view: magnets move up/down at one x-position
  // angle maps to y-offset from center, x stays fixed
  // cos(angle) = depth (toward/away from viewer, affects field strength)
  // sin(angle) = vertical position
  let ringN = getRingCount();
  if (ringN > 0) {
    let ringX = tubeX + getRingPos() * tubeW; // x position along tube
    let cy = tubeY + tubeH / 2;
    let ringR = getRingDist();
    for (let i = 0; i < ringN; i++) {
      let a = spinAngle + (i / ringN) * Math.PI * 2;
      // sin(a) = vertical position, cos(a) = depth (in/out of screen)
      let py = cy + Math.sin(a) * ringR;
      let depth = Math.cos(a); // -1 to 1, how far in/out of screen
      // Field strength scales with depth (closer magnets = stronger)
      let depthScale = 0.3 + 0.7 * Math.abs(depth);
      let pol = getMagnetPolarity(i, ringN);
      // Moment points inward (toward tube center)
      let mmx = 0; // no x-component (ring is perpendicular to tube)
      let mmy = -Math.sin(a) * pol;
      // Magnets in front/back of tube also create x-component field
      let mmx2 = -depth * pol * 0.5;
      let f = dipoleField(mmx + mmx2, mmy, ringX, py, x, y);
      bx += f.bx * fs * depthScale;
      by += f.by * fs * depthScale;
    }
  }

  return { bx, by };
}

function step(dt) {
  if (paused) return;

  // Spin the ring
  let ringN = getRingCount();
  if (ringN > 0) spinAngle += dt * getSpinSpeed();

  let voltage = getVoltage();
  let pressure = getPressure();
  let tension = 0.3;
  let drag = 0.92 + 0.06 * pressure; // higher pressure = more damping
  let jxb = 0.8 * voltage;            // voltage scales the J×B response
  let centerPull = 0.005;
  let restY = tubeY + tubeH / 2;
  let lx = getElectrodeX(electrodeLeft);
  let rx = getElectrodeX(electrodeRight);
  let cy = tubeY + tubeH / 2;
  let arcN = arcs.length;

  for (let aIdx = 0; aIdx < arcN; aIdx++) {
    let arc = arcs[aIdx];
    let yOffset = (arcN > 1) ? (aIdx - (arcN-1)/2) * 6 : 0;

    for (let i = 1; i < N - 1; i++) {
      let p = arc[i];
      let prev = arc[i-1], next = arc[i+1];

      // Spring to neighbors
      let fx = (prev.x + next.x - 2*p.x) * tension;
      let fy = (prev.y + next.y - 2*p.y) * tension;

      // Pull toward this arc's resting line
      fy += (restY + yOffset - p.y) * centerPull;

      // Keep arc between electrodes
      let t = i / (N - 1);
      let targetX = lx + t * (rx - lx);
      fx += (targetX - p.x) * 0.08;

      // J×B force
      let B = totalField(p.x, p.y);
      fy += B.by * jxb;
      fx += B.bx * jxb * 0.5;

      // Other arcs' repulsion (parallel currents repel? actually attract,
      // but visually nicer to repel for separation)
      for (let bIdx = 0; bIdx < arcN; bIdx++) {
        if (bIdx === aIdx) continue;
        let other = arcs[bIdx][i];
        let dy = p.y - other.y;
        let r2 = dy*dy + 4;
        if (r2 < 400) fy += (dy / r2) * 8;
      }

      // Wall repulsion
      let topDist = p.y - (tubeY + 8);
      let botDist = (tubeY + tubeH - 8) - p.y;
      if (topDist < 15) fy += (15 - topDist) * 1.0;
      if (botDist < 15) fy -= (15 - botDist) * 1.0;

      p.vx = (p.vx + fx * dt) * drag;
      p.vy = (p.vy + fy * dt) * drag;
      p.x += p.vx;
      p.y += p.vy;

      // Emit sparks when moving fast (high curvature → high local current)
      let speed2 = p.vx*p.vx + p.vy*p.vy;
      if (speed2 > 4 && Math.random() < 0.05 * voltage) {
        sparks.push({
          x: p.x, y: p.y,
          vx: (Math.random()-0.5) * 4 + p.vx * 0.3,
          vy: (Math.random()-0.5) * 4 + p.vy * 0.3,
          life: 1.0,
          hue: 270 + Math.random() * 60
        });
      }
    }

    // Endpoints fixed at electrodes
    arc[0].x = lx;
    arc[0].y = cy + yOffset;
    arc[N-1].x = rx;
    arc[N-1].y = cy + yOffset;
  }

  // Update sparks
  for (let i = sparks.length - 1; i >= 0; i--) {
    let s = sparks[i];
    s.x += s.vx;
    s.y += s.vy;
    s.vy += 0.05; // tiny gravity for drift
    s.vx *= 0.96;
    s.vy *= 0.96;
    s.life -= 0.025;
    if (s.life <= 0) sparks.splice(i, 1);
  }
  if (sparks.length > 600) sparks.splice(0, sparks.length - 600);
}

// Rendering
function drawTube() {
  let r = tubeH / 2;
  // Glass tube body
  ctx.strokeStyle = 'rgba(100, 120, 140, 0.3)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(tubeX + r, tubeY);
  ctx.lineTo(tubeX + tubeW - r, tubeY);
  ctx.arc(tubeX + tubeW - r, tubeY + r, r, -Math.PI/2, Math.PI/2);
  ctx.lineTo(tubeX + r, tubeY + tubeH);
  ctx.arc(tubeX + r, tubeY + r, r, Math.PI/2, -Math.PI/2);
  ctx.closePath();
  ctx.stroke();

  // Glass reflection
  ctx.strokeStyle = 'rgba(150, 170, 190, 0.08)';
  ctx.lineWidth = 8;
  ctx.stroke();

  // Inner vacuum darkness
  ctx.fillStyle = 'rgba(5, 5, 15, 0.6)';
  ctx.fill();
}

function drawElectrodes() {
  let ey = tubeY + tubeH/2;

  // Left electrode (cathode) — draggable
  let lx = getElectrodeX(electrodeLeft);
  let grad = ctx.createRadialGradient(lx, ey, 2, lx, ey, 14);
  grad.addColorStop(0, '#ffdd77');
  grad.addColorStop(0.4, '#cc8833');
  grad.addColorStop(1, '#664411');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(lx, ey, 12, 0, Math.PI*2);
  ctx.fill();
  // Copper wire left
  ctx.fillStyle = '#553311';
  ctx.fillRect(tubeX - 5, ey - 4, lx - tubeX + 5, 8);
  // Glow at tip
  let glow = ctx.createRadialGradient(lx, ey, 0, lx, ey, 25);
  glow.addColorStop(0, 'rgba(200, 150, 255, 0.3)');
  glow.addColorStop(1, 'rgba(200, 150, 255, 0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(lx, ey, 25, 0, Math.PI*2);
  ctx.fill();
  // Label
  ctx.fillStyle = '#886644';
  ctx.font = '10px monospace';
  ctx.fillText('−', lx - 3, ey + 25);

  // Right electrode (anode) — draggable
  let rx = getElectrodeX(electrodeRight);
  grad = ctx.createRadialGradient(rx, ey, 2, rx, ey, 14);
  grad.addColorStop(0, '#ffdd77');
  grad.addColorStop(0.4, '#cc8833');
  grad.addColorStop(1, '#664411');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(rx, ey, 12, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#553311';
  ctx.fillRect(rx, ey - 4, tubeX + tubeW - rx + 5, 8);
  glow = ctx.createRadialGradient(rx, ey, 0, rx, ey, 25);
  glow.addColorStop(0, 'rgba(255, 150, 150, 0.3)');
  glow.addColorStop(1, 'rgba(255, 150, 150, 0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(rx, ey, 25, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#886644';
  ctx.fillText('+', rx - 3, ey + 25);
}

function drawArc() {
  let voltage = getVoltage();

  for (let aIdx = 0; aIdx < arcs.length; aIdx++) {
    let arc = arcs[aIdx];
    if (arc.length < 2) continue;

    // Outer glow (wide, dim) — intensity scales with voltage
    let glowSteps = 7;
    for (let s = 0; s < glowSteps; s++) {
      let w = 30 - s * 4;
      let alpha = (0.015 + s * 0.006) * voltage;
      let hue = 270 + s * 8 + aIdx * 30;
      ctx.strokeStyle = `hsla(${hue}, 90%, ${55 + s*2}%, ${alpha})`;
      ctx.lineWidth = w;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(arc[0].x, arc[0].y);
      for (let i = 1; i < N; i++) ctx.lineTo(arc[i].x, arc[i].y);
      ctx.stroke();
    }

    // Hot core
    ctx.strokeStyle = `hsla(${280 + aIdx*20}, 80%, 90%, ${0.7 + voltage*0.1})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(arc[0].x, arc[0].y);
    for (let i = 1; i < N; i++) ctx.lineTo(arc[i].x, arc[i].y);
    ctx.stroke();

    // White center
    ctx.strokeStyle = `rgba(255, 255, 255, ${0.4 + voltage*0.15})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(arc[0].x, arc[0].y);
    for (let i = 1; i < N; i++) ctx.lineTo(arc[i].x, arc[i].y);
    ctx.stroke();
  }

  // Sparks
  ctx.globalCompositeOperation = 'lighter';
  for (let s of sparks) {
    let sz = 1 + s.life * 2.5;
    ctx.fillStyle = `hsla(${s.hue}, 90%, 70%, ${s.life * 0.7})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, sz, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
}

function drawMagnets() {
  for (let m of magnets) {
    // Magnet body
    let sz = 20;
    ctx.save();
    ctx.translate(m.x, m.y);

    // N pole (red)
    ctx.fillStyle = '#cc3333';
    ctx.fillRect(-sz/2, -sz/2, sz/2, sz);
    // S pole (blue)
    ctx.fillStyle = '#3333cc';
    ctx.fillRect(0, -sz/2, sz/2, sz);

    // Labels
    ctx.fillStyle = 'white';
    ctx.font = '10px monospace';
    ctx.fillText('N', -sz/2+2, 4);
    ctx.fillText('S', 4, 4);

    // Field direction arrow
    ctx.strokeStyle = 'rgba(255,255,100,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(m.mx * 25, m.my * 25);
    ctx.stroke();

    ctx.restore();
  }

  // Ring magnets — drawn as circle around tube cross-section
  let ringN = getRingCount();
  if (ringN > 0) {
    let ringX = tubeX + getRingPos() * tubeW;
    let cy = tubeY + tubeH / 2;
    let ringR = getRingDist();

    // Ring circle (vertical, around tube)
    ctx.strokeStyle = 'rgba(100, 255, 100, 0.12)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.ellipse(ringX, cy, ringR * 0.3, ringR, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Vertical guide line
    ctx.strokeStyle = 'rgba(100, 255, 100, 0.05)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(ringX, cy - ringR - 10);
    ctx.lineTo(ringX, cy + ringR + 10);
    ctx.stroke();

    // Each magnet
    for (let i = 0; i < ringN; i++) {
      let a = spinAngle + (i / ringN) * Math.PI * 2;
      let py = cy + Math.sin(a) * ringR;
      let depth = Math.cos(a); // in/out of screen
      let px = ringX + depth * ringR * 0.3; // slight x-offset for 3D effect
      let pol = getMagnetPolarity(i, ringN);

      // Size based on depth (closer = bigger)
      let sz = Math.max(2, (4 + depth * 3) - ringN * 0.08);
      let alpha = 0.4 + depth * 0.4; // brighter when in front

      ctx.fillStyle = pol > 0 ? `rgba(220,50,50,${alpha})` : `rgba(50,50,220,${alpha})`;
      ctx.beginPath();
      ctx.arc(px, py, sz, 0, Math.PI*2);
      ctx.fill();

      // Glow
      if (alpha > 0.3) {
        let g = ctx.createRadialGradient(px, py, 0, px, py, sz + 8);
        g.addColorStop(0, pol > 0 ? `rgba(255,80,80,${alpha*0.2})` : `rgba(80,80,255,${alpha*0.2})`);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(px, py, sz + 8, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }
}

function drawFieldLines() {
  // Subtle field visualization
  let step = 40;
  for (let x = tubeX; x < tubeX + tubeW; x += step) {
    for (let y = tubeY - 30; y < tubeY + tubeH + 30; y += step) {
      let B = totalField(x, y);
      let mag = Math.sqrt(B.bx*B.bx + B.by*B.by);
      if (mag < 0.01) continue;
      let len = Math.min(mag * 0.3, 15);
      let nx = B.bx / mag, ny = B.by / mag;
      ctx.strokeStyle = `rgba(100, 200, 100, ${Math.min(mag * 0.05, 0.2)})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - nx*len, y - ny*len);
      ctx.lineTo(x + nx*len, y + ny*len);
      ctx.stroke();
    }
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawFieldLines();
  drawTube();
  drawElectrodes();
  drawArc();
  drawMagnets();

  // Compute arc length and field magnitude at midpoint
  let totalLen = 0;
  if (arcs.length > 0) {
    let arc = arcs[0];
    for (let i = 1; i < N; i++) {
      let dx = arc[i].x - arc[i-1].x, dy = arc[i].y - arc[i-1].y;
      totalLen += Math.sqrt(dx*dx + dy*dy);
    }
  }
  let cy = tubeY + tubeH/2;
  let mid = (getElectrodeX(electrodeLeft) + getElectrodeX(electrodeRight)) / 2;
  let Bmid = totalField(mid, cy);
  let Bmag = Math.sqrt(Bmid.bx*Bmid.bx + Bmid.by*Bmid.by);
  let gap = ((electrodeRight - electrodeLeft) * 100).toFixed(0);
  let current = getVoltage() * (totalLen / 200);

  info.innerHTML =
    `<div style="line-height:1.5">` +
    `<span style="color:#7af">arcs:</span> ${arcs.length} ` +
    `&nbsp;<span style="color:#7af">magnets:</span> ${magnets.length}+${getRingCount()}` +
    `&nbsp;<span style="color:#7af">sparks:</span> ${sparks.length}` +
    `<br><span style="color:#fa7">V:</span> ${getVoltage().toFixed(1)}kV ` +
    `&nbsp;<span style="color:#fa7">I:</span> ${current.toFixed(1)}A ` +
    `&nbsp;<span style="color:#fa7">|B|@mid:</span> ${Bmag.toFixed(2)}` +
    `<br><span style="color:#7fa">arc length:</span> ${totalLen.toFixed(0)}px ` +
    `&nbsp;<span style="color:#7fa">gap:</span> ${gap}%` +
    `&nbsp;${paused ? '<span style="color:#f77">PAUSED</span>' : '<span style="color:#7f7">running</span>'}` +
    `</div>`;
}

function loop() {
  step(0.016);
  render();
  requestAnimationFrame(loop);
}

// Input
canvas.addEventListener('mousedown', (e) => {
  let mx = e.clientX, my = e.clientY;
  let ey = tubeY + tubeH/2;

  // Check electrode grab (within 20px of electrode center)
  let lx = getElectrodeX(electrodeLeft);
  let rx = getElectrodeX(electrodeRight);
  if (Math.abs(mx - lx) < 20 && Math.abs(my - ey) < 25) {
    dragElectrode = 'left';
    return;
  }
  if (Math.abs(mx - rx) < 20 && Math.abs(my - ey) < 25) {
    dragElectrode = 'right';
    return;
  }

  // Check if clicking existing magnet
  for (let i = 0; i < magnets.length; i++) {
    let m = magnets[i];
    if (Math.abs(mx - m.x) < 15 && Math.abs(my - m.y) < 15) {
      if (e.button === 2) {
        m.my = -m.my;
        m.mx = -m.mx;
        return;
      }
      dragIdx = i;
      return;
    }
  }

  // Place new magnet
  if (e.button === 0) {
    magnets.push({
      x: mx, y: my,
      mx: 0, my: my < tubeY + tubeH/2 ? 1 : -1
    });
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (dragIdx >= 0) {
    magnets[dragIdx].x = e.clientX;
    magnets[dragIdx].y = e.clientY;
  }
  if (dragElectrode === 'left') {
    electrodeLeft = Math.max(0.05, Math.min(electrodeRight - 0.1, (e.clientX - tubeX) / tubeW));
    resetArc();
  }
  if (dragElectrode === 'right') {
    electrodeRight = Math.max(electrodeLeft + 0.1, Math.min(0.95, (e.clientX - tubeX) / tubeW));
    resetArc();
  }
});

canvas.addEventListener('mouseup', () => { dragIdx = -1; dragElectrode = null; });
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

document.addEventListener('keydown', (e) => {
  if (e.key === ' ') { paused = !paused; e.preventDefault(); }
  if (e.key === 'r' || e.key === 'R') { resetArc(); }
  if (e.key === 'c' || e.key === 'C') { magnets = []; sliderRingCount.value = 0; updateLabels(); resetArc(); }
  if (e.key === 'Delete' || e.key === 'Backspace') { magnets.pop(); e.preventDefault(); }
});

loop();
</script>
</body>
</html>

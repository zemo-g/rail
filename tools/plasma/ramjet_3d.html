<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>RAIL PLASMA RAMJET — 3D Thruster Visualization</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#ccc;font-family:ui-monospace,Menlo,monospace;overflow:hidden}
canvas{display:block}
#hud{position:fixed;top:12px;left:16px;font-size:12px;color:#889;pointer-events:none;line-height:1.7}
#title{font-size:15px;color:#e0e0e8;letter-spacing:2px;margin-bottom:6px}
#title span{color:#556;font-size:10px}
.hl{color:#6cf}.hr{color:#f84}.hg{color:#8f6}.hy{color:#fa6}
#controls{position:fixed;bottom:12px;left:16px;font-size:11px;color:#667;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
#controls label{display:flex;align-items:center;gap:4px}
#controls input[type=range]{width:70px;height:3px;-webkit-appearance:none;background:#1a1a28;border-radius:2px}
#controls input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:#c9a84c;border-radius:50%;cursor:pointer}
.btn{background:#1a1a28;border:1px solid #2a2a3a;color:#aab;padding:3px 10px;font-size:11px;cursor:pointer;border-radius:3px;font-family:inherit}
.btn:hover{background:#252538}
#dash{position:fixed;top:12px;right:16px;font-size:11px;text-align:right;pointer-events:none;line-height:1.7;color:#556}
.dv{font-size:18px;font-weight:bold}
#hint{position:fixed;bottom:12px;right:16px;font-size:10px;color:#334;text-align:right;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="title">RAIL PLASMA RAMJET <span>3D thruster &middot; magnetic compression</span></div>
  <div>Coils: <span class="hy" id="h-coils">5</span> &nbsp; Voltage: <span class="hr" id="h-volt">20</span>kV &nbsp; Inlet: <span class="hl" id="h-inlet">30</span>Pa</div>
  <div>Thrust: <span class="hr" id="h-thrust">0</span> mN &nbsp; ISP: <span class="hg" id="h-isp">0</span>s &nbsp; v<sub>ex</sub>: <span class="hl" id="h-vex">0</span> km/s</div>
</div>
<div id="dash">
  <div style="color:#445;font-size:10px;text-transform:uppercase;letter-spacing:1px">Exhaust velocity</div>
  <div class="dv hr" id="d-vex">0 km/s</div>
  <div style="color:#445;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-top:6px">Specific impulse</div>
  <div class="dv hg" id="d-isp">0 s</div>
</div>
<div id="controls">
  <label>Coil Power: <input type="range" id="power" min="1" max="100" value="50"><span id="v-pow">50</span></label>
  <label>Voltage: <input type="range" id="voltage" min="0" max="50" value="25"><span id="v-volt">25</span>kV</label>
  <label>Inlet: <input type="range" id="inlet" min="5" max="100" value="40"><span id="v-inl">40</span>Pa</label>
  <label>Throat: <input type="range" id="throat" min="15" max="85" value="45"><span id="v-thr">45</span>%</label>
  <button class="btn" id="btn-mpd">MPD</button>
  <button class="btn" id="btn-hall">Hall</button>
  <button class="btn" id="btn-ramjet">Ramjet</button>
</div>
<div id="hint">drag to orbit &middot; scroll to zoom<br>click presets to change geometry</div>

<script>
// ── WebGL Setup ──
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', {antialias: true, alpha: false});
gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
gl.enable(gl.DEPTH_TEST);
gl.depthFunc(gl.LEQUAL);

let W, H;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  gl.viewport(0, 0, W, H);
}
resize();
window.addEventListener('resize', resize);

// ── Shader compilation ──
function compile(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
function link(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(vs, gl.VERTEX_SHADER));
  gl.attachShader(p, compile(fs, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  return p;
}

// ── Shaders ──
const lineVS = `
attribute vec3 aPos;
attribute vec4 aCol;
uniform mat4 uMVP;
varying vec4 vCol;
void main() { gl_Position = uMVP * vec4(aPos, 1.0); vCol = aCol; }`;
const lineFS = `
precision mediump float;
varying vec4 vCol;
void main() { gl_FragColor = vCol; }`;

const particleVS = `
attribute vec3 aPos;
attribute vec4 aCol;
attribute float aSize;
uniform mat4 uMVP;
varying vec4 vCol;
void main() {
  gl_Position = uMVP * vec4(aPos, 1.0);
  gl_PointSize = aSize / gl_Position.w * 400.0;
  vCol = aCol;
}`;
const particleFS = `
precision mediump float;
varying vec4 vCol;
void main() {
  vec2 c = gl_PointCoord - 0.5;
  float d = dot(c, c);
  if (d > 0.25) discard;
  float a = 1.0 - d * 4.0;
  gl_FragColor = vec4(vCol.rgb, vCol.a * a * a);
}`;

const lineProg = link(lineVS, lineFS);
const partProg = link(particleVS, particleFS);

// ── Math ──
function mat4_perspective(fov, aspect, near, far) {
  const f = 1/Math.tan(fov/2), nf = 1/(near-far);
  return new Float32Array([f/aspect,0,0,0, 0,f,0,0, 0,0,(far+near)*nf,-1, 0,0,2*far*near*nf,0]);
}
function mat4_lookAt(eye, center, up) {
  const z = normalize(sub(eye, center)), x = normalize(cross(up, z)), y = cross(z, x);
  return new Float32Array([x[0],y[0],z[0],0, x[1],y[1],z[1],0, x[2],y[2],z[2],0, -dot(x,eye),-dot(y,eye),-dot(z,eye),1]);
}
function mat4_mul(a, b) {
  const r = new Float32Array(16);
  for (let i=0;i<4;i++) for (let j=0;j<4;j++) {
    r[j*4+i] = a[i]*b[j*4] + a[4+i]*b[j*4+1] + a[8+i]*b[j*4+2] + a[12+i]*b[j*4+3];
  }
  return r;
}
function sub(a,b){return [a[0]-b[0],a[1]-b[1],a[2]-b[2]]}
function cross(a,b){return [a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]]}
function dot(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]}
function normalize(v){const l=Math.sqrt(dot(v,v))||1;return [v[0]/l,v[1]/l,v[2]/l]}

// ── Camera ──
let camTheta = 0.3, camPhi = 0.3, camDist = 6;
let autoRotate = true;
let dragging = false, lastMX, lastMY;
canvas.addEventListener('mousedown', e => { dragging = true; lastMX = e.clientX; lastMY = e.clientY; autoRotate = false; });
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  camTheta += (e.clientX - lastMX) * 0.005;
  camPhi = Math.max(-1.2, Math.min(1.2, camPhi + (e.clientY - lastMY) * 0.005));
  lastMX = e.clientX; lastMY = e.clientY;
});
canvas.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('wheel', e => { camDist = Math.max(2, Math.min(15, camDist + e.deltaY * 0.005)); e.preventDefault(); });

// ── 1D Physics (same as ramjet.html) ──
const NX = 100;
let rho = new Float64Array(NX), vel = new Float64Array(NX), prs = new Float64Array(NX), bth = new Float64Array(NX);
let rho_n = new Float64Array(NX), vel_n = new Float64Array(NX), prs_n = new Float64Array(NX);
const GAMMA = 5/3;

let coils = [
  {x: 0.2, s: 3, p: 1}, {x: 0.35, s: 5, p: 1}, {x: 0.45, s: 7, p: 1},
  {x: 0.6, s: 5, p: -1}, {x: 0.75, s: 3, p: -1}
];

function nozzleR(t) {
  let tp = +document.getElementById('throat').value / 100;
  let d = Math.abs(t - tp), sig = 0.15;
  return 1.0 - 0.65 * Math.exp(-d*d/(2*sig*sig));
}

function computeB() {
  let pw = +document.getElementById('power').value / 10;
  for (let i = 0; i < NX; i++) {
    let t = i/NX, b = 0;
    for (let c of coils) { let d = t - c.x; b += c.s * c.p * pw * Math.exp(-d*d/0.003); }
    bth[i] = b;
  }
}

function initPhysics() {
  let p0 = +document.getElementById('inlet').value;
  for (let i = 0; i < NX; i++) {
    let t = i/NX;
    rho[i] = 1 + p0/30; vel[i] = 2*(0.8+0.4*t); prs[i] = (1+p0/20)*(1-0.2*t);
  }
  computeB();
}
initPhysics();

function physStep() {
  let vlt = +document.getElementById('voltage').value / 10;
  let dx = 1/NX;
  computeB();
  // CFL
  let smax = 0.01;
  for (let i=0;i<NX;i++){let cs=Math.sqrt(GAMMA*Math.max(0.001,prs[i])/Math.max(0.01,rho[i]));let s=Math.abs(vel[i])+cs+Math.abs(bth[i])/Math.sqrt(Math.max(0.01,rho[i]));if(s>smax)smax=s;}
  let dt = 0.3 * dx / smax;
  let cx = dt/(2*dx);
  for (let i=1;i<NX-1;i++){
    let ar=nozzleR(i/NX),al=nozzleR((i-1)/NX),arr=nozzleR((i+1)/NX);
    let ra=0.5*(rho[i-1]+rho[i+1]),va=0.5*(vel[i-1]+vel[i+1]),pa=0.5*(prs[i-1]+prs[i+1]);
    let pr=prs[i+1]+0.5*bth[i+1]*bth[i+1],pl=prs[i-1]+0.5*bth[i-1]*bth[i-1];
    rho_n[i]=ra-cx*(rho[i+1]*vel[i+1]*arr-rho[i-1]*vel[i-1]*al)/ar;
    let mn=ra*va-cx*((rho[i+1]*vel[i+1]*vel[i+1]+pr)*arr-(rho[i-1]*vel[i-1]*vel[i-1]+pl)*al)/ar;
    let dAdx=(arr-al)/(2*dx);mn+=dt*(pa+0.5*bth[i]*bth[i])*dAdx/ar;
    let dBdx=(bth[i+1]-bth[i-1])/(2*dx);mn+=dt*(-dBdx)*bth[i]*vlt*0.5;
    let ea=pa/(GAMMA-1)+0.5*ra*va*va+0.5*bth[i]*bth[i];
    let er=prs[i+1]/(GAMMA-1)+0.5*rho[i+1]*vel[i+1]*vel[i+1]+0.5*bth[i+1]*bth[i+1];
    let el=prs[i-1]/(GAMMA-1)+0.5*rho[i-1]*vel[i-1]*vel[i-1]+0.5*bth[i-1]*bth[i-1];
    let en=ea-cx*((er+pr)*vel[i+1]*arr-(el+pl)*vel[i-1]*al)/ar+dt*vlt*Math.abs(dBdx)*Math.abs(bth[i])*0.01;
    if(rho_n[i]<0.01)rho_n[i]=0.01;vel_n[i]=mn/rho_n[i];
    prs_n[i]=(GAMMA-1)*(en-0.5*rho_n[i]*vel_n[i]*vel_n[i]-0.5*bth[i]*bth[i]);
    if(prs_n[i]<0.001)prs_n[i]=0.001;
  }
  let p0=+document.getElementById('inlet').value;
  rho_n[0]=1+p0/30;vel_n[0]=2+vlt*0.5;prs_n[0]=1+p0/20;
  rho_n[NX-1]=rho_n[NX-2];vel_n[NX-1]=vel_n[NX-2];prs_n[NX-1]=prs_n[NX-2];
  [rho,rho_n]=[rho_n,rho];[vel,vel_n]=[vel_n,vel];[prs,prs_n]=[prs_n,prs];
}

// ── Generate nozzle geometry (lines) ──
function buildNozzle() {
  const segs = 32, rings = 60;
  let verts = [], cols = [];
  for (let j = 0; j <= rings; j++) {
    let t = j / rings;
    let z = (t - 0.5) * 4; // -2 to 2 along z axis
    let r = nozzleR(t) * 0.8;
    for (let i = 0; i < segs; i++) {
      let a0 = (i/segs)*Math.PI*2, a1 = ((i+1)/segs)*Math.PI*2;
      // Ring segment
      verts.push(Math.cos(a0)*r, Math.sin(a0)*r, z);
      verts.push(Math.cos(a1)*r, Math.sin(a1)*r, z);
      cols.push(0.3,0.4,0.5,0.12, 0.3,0.4,0.5,0.12);
    }
    // Longitudinal lines (every 4th)
    if (j < rings) {
      let t2 = (j+1)/rings, z2 = (t2-0.5)*4, r2 = nozzleR(t2)*0.8;
      for (let i = 0; i < segs; i += 4) {
        let a = (i/segs)*Math.PI*2;
        verts.push(Math.cos(a)*r, Math.sin(a)*r, z);
        verts.push(Math.cos(a)*r2, Math.sin(a)*r2, z2);
        cols.push(0.25,0.35,0.45,0.06, 0.25,0.35,0.45,0.06);
      }
    }
  }
  return {v: new Float32Array(verts), c: new Float32Array(cols)};
}

// ── Generate coil geometry (lines forming torus rings) ──
function buildCoils() {
  let verts = [], cols = [];
  for (let ci = 0; ci < coils.length; ci++) {
    let c = coils[ci];
    let z = (c.x - 0.5) * 4;
    let nr = nozzleR(c.x) * 0.8;
    let coilR = nr + 0.08; // slightly outside nozzle
    let tubeR = 0.04;
    let segs = 24, tsegs = 8;
    let cr = c.p > 0 ? 0.9 : 0.3, cg = c.p > 0 ? 0.45 : 0.3, cb = c.p > 0 ? 0.15 : 0.9;
    let intensity = Math.min(1, c.s / 5);
    for (let i = 0; i < segs; i++) {
      let a0 = (i/segs)*Math.PI*2, a1 = ((i+1)/segs)*Math.PI*2;
      for (let j = 0; j < tsegs; j++) {
        let b0 = (j/tsegs)*Math.PI*2, b1 = ((j+1)/tsegs)*Math.PI*2;
        let r0 = coilR + Math.cos(b0)*tubeR, r1 = coilR + Math.cos(b1)*tubeR;
        // Ring direction
        verts.push(Math.cos(a0)*r0, Math.sin(a0)*r0, z + Math.sin(b0)*tubeR);
        verts.push(Math.cos(a1)*r0, Math.sin(a1)*r0, z + Math.sin(b0)*tubeR);
        let al = 0.4 * intensity;
        cols.push(cr,cg,cb,al, cr,cg,cb,al);
      }
    }
    // Inner glow ring
    for (let i = 0; i < segs; i++) {
      let a0 = (i/segs)*Math.PI*2, a1 = ((i+1)/segs)*Math.PI*2;
      verts.push(Math.cos(a0)*coilR, Math.sin(a0)*coilR, z);
      verts.push(Math.cos(a1)*coilR, Math.sin(a1)*coilR, z);
      cols.push(cr,cg,cb,0.6*intensity, cr,cg,cb,0.6*intensity);
    }
  }
  return {v: new Float32Array(verts), c: new Float32Array(cols)};
}

// ── Plasma particles (helical spiraling arcs) ──
const NPARTS = 6000;
let partPos = new Float32Array(NPARTS * 3);
let partCol = new Float32Array(NPARTS * 4);
let partSize = new Float32Array(NPARTS);
let partT = new Float32Array(NPARTS);     // position along tube 0-1
let partAngle = new Float32Array(NPARTS); // angular position (radians)
let partR = new Float32Array(NPARTS);     // radial distance from axis
let partOmega = new Float32Array(NPARTS); // angular velocity
let partStream = new Uint8Array(NPARTS);  // which arc stream (0-5)

const NUM_STREAMS = 6; // 6 helical arc streams

function initParticles() {
  for (let i = 0; i < NPARTS; i++) {
    resetParticle(i);
    partT[i] = Math.random(); // spread initially
  }
}

function resetParticle(i) {
  partT[i] = -0.05 + Math.random() * 0.08;
  partStream[i] = (Math.random() * NUM_STREAMS) | 0;

  // Each stream starts at a fixed angular offset
  let streamAngle = (partStream[i] / NUM_STREAMS) * Math.PI * 2;
  partAngle[i] = streamAngle + (Math.random() - 0.5) * 0.3;
  partR[i] = 0.35 + Math.random() * 0.25; // start near the nozzle wall
  partOmega[i] = 3.0 + Math.random() * 2.0; // base angular velocity (rad/unit-t)

  let z = (partT[i] - 0.5) * 4;
  partPos[i*3] = Math.cos(partAngle[i]) * partR[i];
  partPos[i*3+1] = Math.sin(partAngle[i]) * partR[i];
  partPos[i*3+2] = z;
}

function updateParticles() {
  let throatPos = +document.getElementById('throat').value / 100;

  for (let i = 0; i < NPARTS; i++) {
    let t = partT[i];
    let idx = Math.max(0, Math.min(NX-1, (t * NX) | 0));

    // Axial velocity from MHD sim
    let v = vel[idx];
    let axialSpeed = Math.max(0.002, v * 0.003);
    partT[i] += axialSpeed;

    // Nozzle radius at current position
    let tClamped = Math.max(0, Math.min(1, partT[i]));
    let nr = nozzleR(tClamped) * 0.72;

    // ── Helical spiral dynamics ──
    // Conservation of angular momentum: as radius shrinks, omega increases
    // L = r * omega = const → omega = L / r
    let targetR = nr * (0.5 + 0.4 * (partR[i] / 0.6)); // track nozzle shape
    targetR = Math.min(targetR, nr * 0.9);

    // Smooth radius transition
    partR[i] += (targetR - partR[i]) * 0.08;
    partR[i] = Math.max(0.02, partR[i]);

    // Angular velocity increases as radius decreases (angular momentum conservation)
    let baseOmega = 3.0 + partStream[i] * 0.3;
    let compression = 0.6 / Math.max(0.05, partR[i]); // tighter radius = faster spin
    let omega = baseOmega * compression;

    // Past the throat: plasma straightens out into a beam
    let pastThroat = Math.max(0, (tClamped - throatPos) / (1 - throatPos));
    let straighten = pastThroat * pastThroat; // quadratic straightening

    // Angular velocity reduces after throat (beam formation)
    omega *= (1.0 - straighten * 0.85);

    // Radius collapses to a tight beam after throat
    if (pastThroat > 0.3) {
      let beamR = 0.08 * (1 - straighten * 0.7);
      partR[i] += (beamR - partR[i]) * straighten * 0.15;
    }

    partAngle[i] += omega * axialSpeed;

    // Set 3D position
    let z = (partT[i] - 0.5) * 4;
    partPos[i*3] = Math.cos(partAngle[i]) * partR[i];
    partPos[i*3+1] = Math.sin(partAngle[i]) * partR[i];
    partPos[i*3+2] = z;

    // Thermal jitter (less in the beam, more in the intake)
    let jitter = 0.006 * (1 - straighten * 0.8);
    partPos[i*3] += (Math.random() - 0.5) * jitter;
    partPos[i*3+1] += (Math.random() - 0.5) * jitter;

    // ── Color from physics ──
    let r_val = rho[idx], p_val = prs[idx];
    let temp = p_val / Math.max(0.01, r_val);
    let tn = Math.min(1, temp / 4);
    let vn = Math.min(1, v / 10);
    let rn = Math.min(1, r_val / 3);

    // Arc color shifts per stream — each stream has a slight hue variation
    let streamHue = partStream[i] / NUM_STREAMS;
    let hueShift = Math.sin(streamHue * Math.PI * 2) * 0.15;

    // Intake: blue-violet arcs. Compression: white-hot. Exhaust: concentrated pink-white beam
    let pr, pg, pb, pa;
    if (straighten < 0.1) {
      // Pre-throat: swirling violet-blue arcs
      pr = 0.4 + tn * 0.6 + hueShift * 0.3;
      pg = 0.15 + tn * 0.35;
      pb = 0.7 + rn * 0.3 - tn * 0.2;
      pa = 0.35 + rn * 0.25 + tn * 0.15;
    } else if (straighten < 0.5) {
      // Throat: white-hot compression
      let hotness = (straighten - 0.1) / 0.4;
      pr = 0.6 + hotness * 0.4;
      pg = 0.3 + hotness * 0.6;
      pb = 0.5 + hotness * 0.4;
      pa = 0.4 + hotness * 0.4;
    } else {
      // Exhaust beam: concentrated, bright, pure output
      let beamI = Math.min(1, (straighten - 0.5) * 2);
      pr = 0.95 + hueShift * 0.05;
      pg = 0.7 + beamI * 0.2;
      pb = 0.9 - beamI * 0.2;
      pa = 0.5 + beamI * 0.3;
    }

    partCol[i*4] = pr;
    partCol[i*4+1] = pg;
    partCol[i*4+2] = pb;
    partCol[i*4+3] = pa;

    // Size: fat swirling arcs → thin concentrated beam
    let arcWidth = 0.06 - straighten * 0.04;
    partSize[i] = arcWidth * (1 + tn * 0.3 + rn * 0.2);

    // ── Exhaust: tight focused beam that barely expands ──
    if (partT[i] > 1.0) {
      let exhaust = (partT[i] - 1.0);
      // Very slight expansion — condensed output
      partR[i] *= 1.0 + exhaust * 0.05;
      partPos[i*3] = Math.cos(partAngle[i]) * partR[i];
      partPos[i*3+1] = Math.sin(partAngle[i]) * partR[i];
      // Fade slowly — the beam stays bright
      partCol[i*4+3] *= Math.max(0, 1 - exhaust * 0.6);
      // Slight size increase
      partSize[i] *= 1 + exhaust * 0.3;
    }

    // Reset if far past exhaust
    if (partT[i] > 1.5) resetParticle(i);
  }
}
initParticles();

// ── GL buffers ──
function createBuf(data) {
  const b = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, b);
  gl.bufferData(gl.ARRAY_BUFFER, data, gl.DYNAMIC_DRAW);
  return b;
}

const nozzle = buildNozzle();
const nBufV = createBuf(nozzle.v), nBufC = createBuf(nozzle.c);
let cBufV = createBuf(new Float32Array(0)), cBufC = createBuf(new Float32Array(0));
const pBufV = createBuf(partPos), pBufC = createBuf(partCol), pBufS = createBuf(partSize);

function rebuildCoilBuffers() {
  const c = buildCoils();
  gl.bindBuffer(gl.ARRAY_BUFFER, cBufV); gl.bufferData(gl.ARRAY_BUFFER, c.v, gl.DYNAMIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER, cBufC); gl.bufferData(gl.ARRAY_BUFFER, c.c, gl.DYNAMIC_DRAW);
  return c.v.length / 3;
}
let coilVertCount = rebuildCoilBuffers();

// ── Draw helpers ──
function drawLines(prog, bufV, bufC, count, mvp) {
  gl.useProgram(prog);
  gl.uniformMatrix4fv(gl.getUniformLocation(prog, 'uMVP'), false, mvp);
  const aPos = gl.getAttribLocation(prog, 'aPos'), aCol = gl.getAttribLocation(prog, 'aCol');
  gl.enableVertexAttribArray(aPos); gl.enableVertexAttribArray(aCol);
  gl.bindBuffer(gl.ARRAY_BUFFER, bufV); gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);
  gl.bindBuffer(gl.ARRAY_BUFFER, bufC); gl.vertexAttribPointer(aCol, 4, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.LINES, 0, count);
}

function drawParticles(mvp) {
  gl.useProgram(partProg);
  gl.uniformMatrix4fv(gl.getUniformLocation(partProg, 'uMVP'), false, mvp);
  const aPos = gl.getAttribLocation(partProg, 'aPos');
  const aCol = gl.getAttribLocation(partProg, 'aCol');
  const aSize = gl.getAttribLocation(partProg, 'aSize');
  gl.enableVertexAttribArray(aPos); gl.enableVertexAttribArray(aCol); gl.enableVertexAttribArray(aSize);
  gl.bindBuffer(gl.ARRAY_BUFFER, pBufV);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, partPos);
  gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);
  gl.bindBuffer(gl.ARRAY_BUFFER, pBufC);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, partCol);
  gl.vertexAttribPointer(aCol, 4, gl.FLOAT, false, 0, 0);
  gl.bindBuffer(gl.ARRAY_BUFFER, pBufS);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, partSize);
  gl.vertexAttribPointer(aSize, 1, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.POINTS, 0, NPARTS);
}

// ── Metrics ──
function updateMetrics() {
  let vex = vel[NX-1], rex = rho[NX-1];
  let mdot = rex * vex;
  let thrust = mdot * vex;
  let isp = vex / 9.81 * 1000;
  document.getElementById('h-thrust').textContent = (thrust*100).toFixed(0);
  document.getElementById('h-isp').textContent = isp.toFixed(0);
  document.getElementById('h-vex').textContent = (vex*0.5).toFixed(1);
  document.getElementById('h-coils').textContent = coils.length;
  document.getElementById('h-volt').textContent = document.getElementById('voltage').value;
  document.getElementById('h-inlet').textContent = document.getElementById('inlet').value;
  document.getElementById('d-vex').textContent = (vex*0.5).toFixed(1) + ' km/s';
  document.getElementById('d-isp').textContent = isp.toFixed(0) + ' s';
}

// ── Main loop ──
let frame = 0;
function loop() {
  // Physics
  for (let i = 0; i < 30; i++) physStep();
  updateParticles();

  // Camera
  if (autoRotate) camTheta += 0.003;
  let ex = Math.cos(camPhi) * Math.sin(camTheta) * camDist;
  let ey = Math.sin(camPhi) * camDist;
  let ez = Math.cos(camPhi) * Math.cos(camTheta) * camDist;
  let proj = mat4_perspective(0.8, W/H, 0.1, 100);
  let view = mat4_lookAt([ex,ey,ez], [0,0,0], [0,1,0]);
  let mvp = mat4_mul(proj, view);

  // Render
  gl.clearColor(0.02, 0.02, 0.04, 1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

  // Nozzle wireframe
  gl.depthMask(false);
  drawLines(lineProg, nBufV, nBufC, nozzle.v.length / 3, mvp);

  // Coils
  drawLines(lineProg, cBufV, cBufC, coilVertCount, mvp);

  // Particles (additive blend, no depth write)
  drawParticles(mvp);
  gl.depthMask(true);

  if (++frame % 5 === 0) updateMetrics();
  requestAnimationFrame(loop);
}

// ── Controls ──
for (let id of ['power','voltage','inlet','throat']) {
  document.getElementById(id).addEventListener('input', function() {
    let label = {power:'v-pow',voltage:'v-volt',inlet:'v-inl',throat:'v-thr'}[id];
    document.getElementById(label).textContent = this.value + (id==='voltage'?'kV':id==='inlet'?'Pa':id==='throat'?'%':'');
  });
}

function setPreset(cs, pw, vt, inl, th) {
  coils = cs;
  document.getElementById('power').value = pw; document.getElementById('v-pow').textContent = pw;
  document.getElementById('voltage').value = vt; document.getElementById('v-volt').textContent = vt+'kV';
  document.getElementById('inlet').value = inl; document.getElementById('v-inl').textContent = inl+'Pa';
  document.getElementById('throat').value = th; document.getElementById('v-thr').textContent = th+'%';
  coilVertCount = rebuildCoilBuffers();
  initPhysics();
}
document.getElementById('btn-mpd').onclick = () => setPreset([{x:0.3,s:3,p:1},{x:0.45,s:5,p:1},{x:0.6,s:4,p:-1}], 50, 30, 40, 50);
document.getElementById('btn-hall').onclick = () => setPreset([{x:0.35,s:2,p:1},{x:0.5,s:4,p:-1},{x:0.65,s:2,p:1}], 60, 15, 30, 55);
document.getElementById('btn-ramjet').onclick = () => setPreset([{x:0.2,s:3,p:1},{x:0.35,s:5,p:1},{x:0.45,s:7,p:1},{x:0.6,s:5,p:-1},{x:0.75,s:3,p:-1}], 70, 40, 50, 45);

// Update nozzle geometry when throat changes
document.getElementById('throat').addEventListener('input', () => {
  const n = buildNozzle();
  gl.bindBuffer(gl.ARRAY_BUFFER, nBufV); gl.bufferData(gl.ARRAY_BUFFER, n.v, gl.DYNAMIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER, nBufC); gl.bufferData(gl.ARRAY_BUFFER, n.c, gl.DYNAMIC_DRAW);
  nozzle.v = n.v; nozzle.c = n.c;
  coilVertCount = rebuildCoilBuffers();
});

loop();
</script>
